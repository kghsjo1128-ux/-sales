<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Neo 로컬 웹앱 허브</title>
  <style>
    :root { color-scheme: light dark; font-family: system-ui, "Segoe UI", sans-serif; }
    body { margin: 0; padding: 24px; max-width: 640px; margin-inline: auto; line-height: 1.5; }
    h1 { font-size: 1.25rem; margin: 0 0 8px; }
    p.note { margin: 0 0 20px; color: #666; font-size: 0.9rem; }
    ul { list-style: none; padding: 0; margin: 0; display: grid; gap: 12px; }
    a.card {
      display: block; padding: 16px 18px; border-radius: 12px;
      border: 1px solid #ccc; text-decoration: none; color: inherit;
      background: #fafafa;
    }
    a.card:hover { border-color: #888; background: #f0f0f0; }
    a.card strong { display: block; font-size: 1.05rem; margin-bottom: 4px; }
    a.card span { font-size: 0.85rem; color: #555; word-break: break-all; }
    code { font-size: 0.8rem; }
  </style>
</head>
<body>
  <h1>Neo 로컬 웹앱 (확인용)</h1>
  <p class="note">
    아래 링크는 <strong>http://localhost</strong>로 열 때만 의미가 있습니다.
    먼저 프로젝트 폴더에서 <code>start-local-webapps.cmd</code>를 실행한 뒤,
    표시되는 주소로 들어오세요.
  </p>
  <ul>
    <li>
      <a class="card" id="link-hq" href="./hq/"><strong>본사 관리 (관리자)</strong><span id="url-hq"></span></a>
    </li>
    <li>
      <a class="card" id="link-field" href="./field/"><strong>현장 영업사원</strong><span id="url-field"></span></a>
    </li>
  </ul>
  <script>
    (function () {
      var base = location.origin + location.pathname.replace(/index\.html$/i, "");
      document.getElementById("url-hq").textContent = base + "hq/";
      document.getElementById("url-field").textContent = base + "field/";
    })();
  </script>
</body>
</html>
