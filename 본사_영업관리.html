<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>네오래빗 본사 관리 (관리자 전용)</title>
<meta name="description" content="네오래빗 본사 영업 관리 · 관리자 전용" />
<meta property="og:type" content="website" />
<meta property="og:title" content="네오래빗 · 본사 관리" />
<meta property="og:description" content="입점·사원 통계 등 본사 콘솔입니다. 링크를 눌러 로그인하세요." />
<meta name="twitter:card" content="summary" />
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-check-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore-compat.js"></script>
<script src="firebase-config.js"></script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #F8FAFB; }
button { font-family: inherit; }
input, select { font-family: inherit; }
table { border-spacing: 0; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useMemo, useRef } = React;

function sendNeoAdminNotification(title, body) {
  if (typeof Notification === "undefined" || Notification.permission !== "granted") return;
  try {
    new Notification(title, { body, tag: "neo-admin-activity", requireInteraction: false });
  } catch (e) { /* ignore */ }
}

// 공용 로그인 (Firebase는 이메일만 지원 → 내부 매핑). 규칙 firestore.rules 의 isSharedNeoRabbit 과 동일 이메일.
// 계정·비밀번호는 Firebase Console에서만 관리 (클라이언트에 비밀번호 상수 금지).
const SHARED_LOGIN_ID = "neorabbit";
const SHARED_AUTH_EMAIL = "neorabbit@neo-rabbit.app";

/** 현장 HTML과 로그인 세션을 나눔(탭별 SESSION + 다른 화면이면 로그아웃). */
const NEO_AUTH_SURFACE_KEY = "neo_auth_surface";
const NEO_AUTH_SURFACE_HQ = "hq";

const NEO_HQ_SAVED_LOGIN_ID_KEY = "neo_saved_login_id_hq";
const NEO_HQ_AUTH_SESSION_START_KEY = "neo_auth_session_started_hq";
const NEO_AUTH_SESSION_DURATION_MS = 24 * 60 * 60 * 1000;

function neoReadSavedLoginId(key) {
  try { return localStorage.getItem(key) || ""; } catch (e) { return ""; }
}
function neoSaveSavedLoginId(key, rawId) {
  try {
    const s = String(rawId || "").trim();
    if (s) localStorage.setItem(key, s);
  } catch (e) { /* ignore */ }
}
function neoGetAuthSessionStarted(key) {
  try {
    const v = localStorage.getItem(key);
    const n = v ? parseInt(v, 10) : 0;
    return n > 0 && !isNaN(n) ? n : null;
  } catch (e) { return null; }
}
function neoSetAuthSessionStarted(key) {
  try { localStorage.setItem(key, String(Date.now())); } catch (e) {}
}
function neoClearAuthSessionStarted(key) {
  try { localStorage.removeItem(key); } catch (e) {}
}
function neoAuthSessionExpired(key) {
  const t = neoGetAuthSessionStarted(key);
  if (!t) return false;
  return Date.now() - t > NEO_AUTH_SESSION_DURATION_MS;
}
function neoHqSignOut() {
  neoClearAuthSessionStarted(NEO_HQ_AUTH_SESSION_START_KEY);
  firebase.auth().signOut();
}

/** 인증 메일·Hosting 기본 URL 등에 쓰는 스킴(http / https). */
const NEO_PUBLIC_URL_SCHEME = "https://";

// Firestore 규칙 isAdmin() 과 동일 (회사 도메인 또는 profiles.role === "admin" 또는 공용 계정)
const ADMIN_EMAIL_DOMAIN = "@unsat.co.kr";

function isAdminEmail(email) {
  if (!email) return false;
  return email.toLowerCase().endsWith(ADMIN_EMAIL_DOMAIN.toLowerCase());
}

function loginIdToAuthEmail(raw) {
  const s = (raw || "").trim();
  if (!s) return s;
  if (s.indexOf("@") >= 0) return s;
  if (s.toLowerCase() === SHARED_LOGIN_ID) return SHARED_AUTH_EMAIL;
  return s;
}

function isSharedNeoRabbitUser(user) {
  return !!(user && user.email && user.email.toLowerCase() === SHARED_AUTH_EMAIL.toLowerCase());
}

function mapAuthError(e) {
  const c = e && e.code;
  if (c === "auth/email-already-in-use") return "이미 가입된 이메일입니다.";
  if (c === "auth/invalid-email") return "이메일 형식을 확인해 주세요.";
  if (c === "auth/weak-password") return "비밀번호는 6자 이상으로 설정해 주세요.";
  if (c === "auth/user-not-found") return "가입된 계정이 없습니다.";
  if (c === "auth/wrong-password" || c === "auth/invalid-credential") return "이메일 또는 비밀번호를 확인해 주세요.";
  if (c === "auth/too-many-requests") return "시도가 너무 많습니다. 잠시 후 다시 시도해 주세요.";
  if (c === "auth/network-request-failed") return "네트워크를 확인해 주세요.";
  if (c === "auth/unauthorized-continue-uri") return "메일 링크 주소가 Firebase에 허용되지 않았습니다. Authentication → 설정 → 승인된 도메인에 배포 URL을 추가하거나, firebase-config.js 에 window.__NEO_EMAIL_CONTINUE_URL__ 을 http(s) 주소로 넣으세요.";
  return (e && e.message) || String(e);
}

function neoAuthActionCodeSettings() {
  const cfg = window.__NEO_FIREBASE_CONFIG__ || {};
  const custom = window.__NEO_EMAIL_CONTINUE_URL__;
  if (typeof custom === "string") {
    const t = custom.trim();
    if (t.indexOf("https://") === 0 || t.indexOf("http://") === 0) return { url: t.split("#")[0], handleCodeInApp: false };
  }
  if (typeof window !== "undefined" && window.location && (window.location.protocol === "https:" || window.location.protocol === "http:")) {
    return { url: (window.location.origin + window.location.pathname + window.location.search).split("#")[0], handleCodeInApp: false };
  }
  const pid = cfg.projectId;
  if (typeof pid === "string" && pid && String(pid).indexOf("YOUR_") !== 0) {
    return { url: NEO_PUBLIC_URL_SCHEME + pid + ".web.app/h", handleCodeInApp: false };
  }
  const domain = cfg.authDomain;
  if (typeof domain === "string" && domain && String(domain).indexOf("YOUR_") !== 0 && domain.indexOf(".") > 0) {
    return { url: NEO_PUBLIC_URL_SCHEME + domain + "/", handleCodeInApp: false };
  }
  return undefined;
}

/** 영업사원 앱(현장) 안내용 공개 URL. optional: window.__NEO_FIELD_APP_URL__ (http(s) 전체 주소). */
function getNeoFieldAppUrl() {
  const custom = typeof window !== "undefined" && window.__NEO_FIELD_APP_URL__;
  if (typeof custom === "string") {
    const t = custom.trim();
    if (t.indexOf("https://") === 0 || t.indexOf("http://") === 0) return t.split("#")[0];
  }
  if (typeof window !== "undefined" && window.location && (window.location.protocol === "https:" || window.location.protocol === "http:")) {
    try {
      return new URL("/f", window.location.origin).href.split("#")[0];
    } catch (e) { /* ignore */ }
  }
  const cfg = window.__NEO_FIREBASE_CONFIG__ || {};
  const pid = cfg.projectId;
  if (typeof pid === "string" && pid && String(pid).indexOf("YOUR_") !== 0) {
    return NEO_PUBLIC_URL_SCHEME + pid + ".web.app/f";
  }
  return "";
}

function getNeoPublicOrigin() {
  if (typeof window !== "undefined" && window.location && (window.location.protocol === "https:" || window.location.protocol === "http:")) {
    return window.location.origin;
  }
  const cfg = window.__NEO_FIREBASE_CONFIG__ || {};
  const pid = cfg.projectId;
  if (typeof pid === "string" && pid && String(pid).indexOf("YOUR_") !== 0) {
    return NEO_PUBLIC_URL_SCHEME + pid + ".web.app";
  }
  return "";
}

/** 본사 관리 앱 짧은 주소. (선택) firebase-config.js 의 window.__NEO_HQ_APP_URL__ 로 덮어쓰기. */
function getNeoHqAppUrl() {
  const custom = typeof window !== "undefined" && window.__NEO_HQ_APP_URL__;
  if (typeof custom === "string") {
    const t = custom.trim();
    if (t.indexOf("https://") === 0 || t.indexOf("http://") === 0) return t.split("#")[0];
  }
  const o = getNeoPublicOrigin();
  if (o) {
    try {
      return new URL("/h", o).href.split("#")[0];
    } catch (e) { /* ignore */ }
  }
  return "";
}

function getNeoSalesBridgeUrl() {
  const o = getNeoPublicOrigin();
  return o ? o + "/sales" : "";
}

function getNeoAdminBridgeUrl() {
  const o = getNeoPublicOrigin();
  return o ? o + "/admin-check" : "";
}

function neoCopyToClipboard(text) {
  if (!text) return Promise.reject(new Error("empty"));
  if (navigator.clipboard && navigator.clipboard.writeText) {
    return navigator.clipboard.writeText(text).catch(() => neoCopyToClipboardFallback(text));
  }
  return neoCopyToClipboardFallback(text);
}

function neoCopyToClipboardFallback(text) {
  return new Promise((resolve, reject) => {
    try {
      const ta = document.createElement("textarea");
      ta.value = text;
      ta.setAttribute("readonly", "");
      ta.style.position = "fixed";
      ta.style.left = "-2000px";
      document.body.appendChild(ta);
      ta.select();
      document.execCommand("copy");
      document.body.removeChild(ta);
      resolve();
    } catch (e) {
      try {
        window.prompt("아래 주소를 복사해 주세요:", text);
        resolve();
      } catch (e2) {
        reject(e2);
      }
    }
  });
}

function AdminLoginGate() {
  const [user, setUser] = useState(undefined);
  const [authErr, setAuthErr] = useState("");
  const [configError, setConfigError] = useState("");
  const [authMode, setAuthMode] = useState("login");
  const [email, setEmail] = useState(() => neoReadSavedLoginId(NEO_HQ_SAVED_LOGIN_ID_KEY));
  const [password, setPassword] = useState("");
  const [password2, setPassword2] = useState("");
  const [infoMsg, setInfoMsg] = useState("");
  const [adminAllowed, setAdminAllowed] = useState(null);

  useEffect(() => {
    const cfg = window.__NEO_FIREBASE_CONFIG__;
    if (!cfg || !cfg.apiKey || String(cfg.apiKey).indexOf("YOUR_") === 0) {
      setConfigError("neo 폴더의 firebase-config.js에 Firebase 웹 앱 설정을 넣어주세요.");
      setUser(null);
      return undefined;
    }
    setConfigError("");
    if (!firebase.apps.length) firebase.initializeApp(cfg);
    if (typeof window.neoActivateAppCheckIfConfigured === "function") window.neoActivateAppCheckIfConfigured();
    let unsub = null;
    let cancelled = false;
    (async () => {
      try {
        await firebase.auth().setPersistence(firebase.auth.Auth.Persistence.SESSION);
        const prev = sessionStorage.getItem(NEO_AUTH_SURFACE_KEY);
        if (prev && prev !== NEO_AUTH_SURFACE_HQ) await firebase.auth().signOut();
        if (!cancelled) sessionStorage.setItem(NEO_AUTH_SURFACE_KEY, NEO_AUTH_SURFACE_HQ);
      } catch (e) {
        console.warn("[Neo] auth persistence:", e);
      }
      if (cancelled) return;
      firebase.auth().languageCode = "ko";
      unsub = firebase.auth().onAuthStateChanged(setUser);
    })();
    return () => {
      cancelled = true;
      if (unsub) unsub();
    };
  }, []);

  useEffect(() => {
    if (!user) {
      setAdminAllowed(null);
      return undefined;
    }
    if (isSharedNeoRabbitUser(user)) {
      setAdminAllowed(true);
      return undefined;
    }
    if (isAdminEmail(user.email)) {
      setAdminAllowed(true);
      return undefined;
    }
    const db = firebase.firestore();
    const unsub = db.collection("profiles").doc(user.uid).onSnapshot(
      snap => setAdminAllowed(!!(snap.exists && snap.data().role === "admin")),
      () => setAdminAllowed(false)
    );
    return () => unsub();
  }, [user]);

  useEffect(() => {
    if (!user) return undefined;
    const tick = () => {
      if (neoAuthSessionExpired(NEO_HQ_AUTH_SESSION_START_KEY)) neoHqSignOut();
    };
    if (neoAuthSessionExpired(NEO_HQ_AUTH_SESSION_START_KEY)) {
      neoHqSignOut();
      return undefined;
    }
    if (!neoGetAuthSessionStarted(NEO_HQ_AUTH_SESSION_START_KEY)) neoSetAuthSessionStarted(NEO_HQ_AUTH_SESSION_START_KEY);
    const id = setInterval(tick, 60 * 1000);
    if (typeof window !== "undefined") window.addEventListener("focus", tick);
    return () => {
      clearInterval(id);
      if (typeof window !== "undefined") window.removeEventListener("focus", tick);
    };
  }, [user]);

  const doLogin = async e => {
    e.preventDefault();
    setAuthErr("");
    setInfoMsg("");
    try {
      await firebase.auth().signInWithEmailAndPassword(loginIdToAuthEmail(email), password);
      neoSaveSavedLoginId(NEO_HQ_SAVED_LOGIN_ID_KEY, email);
      neoSetAuthSessionStarted(NEO_HQ_AUTH_SESSION_START_KEY);
    } catch (err) {
      setAuthErr(mapAuthError(err));
    }
  };

  const doSignup = async e => {
    e.preventDefault();
    setAuthErr("");
    setInfoMsg("");
    const authEmail = loginIdToAuthEmail(email);
    if (authEmail === SHARED_AUTH_EMAIL) {
      setAuthErr("공용 아이디 " + SHARED_LOGIN_ID + " 는 회원가입 없이 로그인만 사용하세요.");
      return;
    }
    if (password.length < 6) {
      setAuthErr("비밀번호는 6자 이상이어야 합니다.");
      return;
    }
    if (password !== password2) {
      setAuthErr("비밀번호가 서로 일치하지 않습니다.");
      return;
    }
    try {
      await firebase.auth().createUserWithEmailAndPassword(authEmail, password);
      neoSaveSavedLoginId(NEO_HQ_SAVED_LOGIN_ID_KEY, email);
      neoSetAuthSessionStarted(NEO_HQ_AUTH_SESSION_START_KEY);
    } catch (err) {
      setAuthErr(mapAuthError(err));
    }
  };

  const doResetPassword = async e => {
    e.preventDefault();
    setAuthErr("");
    setInfoMsg("");
    const em = loginIdToAuthEmail(email).trim();
    if (!em) {
      setAuthErr("아이디 또는 이메일을 입력해 주세요.");
      return;
    }
    try {
      const acs = neoAuthActionCodeSettings();
      if (acs) await firebase.auth().sendPasswordResetEmail(em, acs);
      else await firebase.auth().sendPasswordResetEmail(em);
      setInfoMsg("비밀번호 재설정 링크를 메일로 보냈습니다. 받은편지함(스팸함 포함)을 확인해 주세요.");
    } catch (err) {
      setAuthErr(mapAuthError(err));
    }
  };

  const inStyle = { width: "100%", padding: "12px 14px", borderRadius: 10, border: "1.5px solid #E5E7EB", fontSize: 14, boxSizing: "border-box", background: "#FAFAFA" };
  const lb = { display: "block", fontSize: 12, fontWeight: 600, color: "#374151", marginBottom: 6 };
  const linkBtn = { background: "none", border: "none", cursor: "pointer", color: "#028090", fontSize: 13, fontWeight: 600, textDecoration: "underline", padding: 0 };

  if (configError) {
    return (
      <div style={{ minHeight: "100vh", background: "#F8FAFB", display: "flex", alignItems: "center", justifyContent: "center", padding: 24 }}>
        <div style={{ color: "#DC2626", maxWidth: 440, textAlign: "center", lineHeight: 1.6, fontSize: 14 }}>{configError}</div>
      </div>
    );
  }
  if (user === undefined) {
    return (
      <div style={{ minHeight: "100vh", background: "#F8FAFB", display: "flex", alignItems: "center", justifyContent: "center" }}>
        <div style={{ fontSize: 15, color: "#6B7280" }}>로그인 확인 중…</div>
      </div>
    );
  }
  if (!user) {
    return (
      <div style={{ minHeight: "100vh", background: "#F8FAFB", display: "flex", alignItems: "center", justifyContent: "center", padding: 24 }}>
        <div style={{ width: "100%", maxWidth: 400, background: "#fff", borderRadius: 20, padding: "32px 28px", boxShadow: "0 4px 24px rgba(0,0,0,0.08)" }}>
          <div style={{ fontSize: 11, fontWeight: 800, color: "#B45309", letterSpacing: 0.02, marginBottom: 8, textTransform: "uppercase" }}>본사 · 관리자 전용</div>
          <div style={{ fontSize: 22, fontWeight: 800, color: "#1A1A2E", marginBottom: 6 }}>네오래빗 본사 관리</div>
          <div style={{
            fontSize: 12, color: "#92400E", lineHeight: 1.55, marginBottom: 16, padding: "12px 14px", background: "#FFFBEB", borderRadius: 12, border: "1px solid #FCD34D",
          }}>
            <b>현장 영업사원</b>이시면 이 파일이 아니라 <b>현장_영업사원.html</b> 을 여세요. 여기는 입점·사원 통계를 보는 <b>본사 콘솔</b>입니다.
          </div>
          <p style={{ fontSize: 13, color: "#6B7280", marginBottom: 22, lineHeight: 1.5 }}>
            {authMode === "login" && ("로그인: 공용 아이디 " + SHARED_LOGIN_ID + " + 비밀번호, 또는 본사 이메일 계정.")}
            {authMode === "signup" && ("「관리자 회원가입」만 해당합니다. 가입 후 " + ADMIN_EMAIL_DOMAIN + " 이거나 Firestore profiles에 role admin 이어야 이 화면에 들어올 수 있습니다. 영업사원 가입은 현장_영업사원.html 에서 하세요.")}
            {authMode === "forgotId" && "아이디(로그인 ID) 안내"}
            {authMode === "forgotPw" && "가입 시 이메일로 재설정 링크를 보냅니다."}
          </p>

          {authMode === "forgotId" && (
            <div style={{ marginBottom: 20 }}>
              <p style={{ fontSize: 14, color: "#374151", lineHeight: 1.7 }}>공용 계정은 아이디 <b>{SHARED_LOGIN_ID}</b> 입니다. 그 외는 <b>가입 시 이메일</b>이 아이디입니다. 이메일이 기억나지 않으면 관리자에게 문의하세요.</p>
              <button type="button" style={{ ...linkBtn, marginTop: 16 }} onClick={() => { setAuthMode("login"); setAuthErr(""); setInfoMsg(""); }}>로그인으로 돌아가기</button>
            </div>
          )}

          {(authMode === "login" || authMode === "signup" || authMode === "forgotPw") && (
            <form onSubmit={authMode === "login" ? doLogin : authMode === "signup" ? doSignup : doResetPassword}>
              <div style={{ marginBottom: 14 }}>
                <label style={lb}>아이디 또는 이메일</label>
                <input type="text" autoComplete="username" value={email} onChange={e => setEmail(e.target.value)} style={inStyle} placeholder={SHARED_LOGIN_ID + " 또는 name@company.com"} required />
              </div>
              {authMode !== "forgotPw" && (
                <div style={{ marginBottom: 14 }}>
                  <label style={lb}>비밀번호</label>
                  <input type="password" autoComplete={authMode === "signup" ? "new-password" : "current-password"} value={password} onChange={e => setPassword(e.target.value)} style={inStyle} placeholder="6자 이상" required={authMode !== "forgotPw"} />
                </div>
              )}
              {authMode === "signup" && (
                <div style={{ marginBottom: 18 }}>
                  <label style={lb}>비밀번호 확인</label>
                  <input type="password" autoComplete="new-password" value={password2} onChange={e => setPassword2(e.target.value)} style={inStyle} placeholder="다시 입력" required />
                </div>
              )}
              {authErr ? <div style={{ color: "#DC2626", fontSize: 13, marginBottom: 12 }}>{authErr}</div> : null}
              {infoMsg ? <div style={{ color: "#059669", fontSize: 13, marginBottom: 12, lineHeight: 1.5 }}>{infoMsg}</div> : null}
              {authMode === "login" ? (
                <p style={{ fontSize: 11, color: "#9CA3AF", lineHeight: 1.45, marginBottom: 10 }}>아이디(또는 이메일)는 이 브라우저에만 저장됩니다. 로그인 후 <b>24시간</b>이 지나면 자동으로 로그아웃됩니다.</p>
              ) : null}
              <button type="submit" style={{ width: "100%", padding: "14px", borderRadius: 12, border: "none", cursor: "pointer", fontWeight: 700, fontSize: 15, background: "linear-gradient(135deg, #028090, #00A896)", color: "#fff", marginBottom: 14 }}>
                {authMode === "login" ? "로그인" : authMode === "signup" ? "관리자 회원가입" : "재설정 메일 보내기"}
              </button>
            </form>
          )}

          {authMode === "login" && (
            <div style={{ display: "flex", flexWrap: "wrap", gap: "12px 16px", justifyContent: "center", marginTop: 8 }}>
              <button type="button" style={linkBtn} onClick={() => { setAuthMode("signup"); setAuthErr(""); setInfoMsg(""); }}>관리자 회원가입</button>
              <button type="button" style={linkBtn} onClick={() => { setAuthMode("forgotId"); setAuthErr(""); setInfoMsg(""); }}>아이디 찾기</button>
              <button type="button" style={linkBtn} onClick={() => { setAuthMode("forgotPw"); setAuthErr(""); setInfoMsg(""); }}>비밀번호 찾기</button>
            </div>
          )}

async function ensureNeoSeed(db) {
  const appRef = db.collection("settings").doc("app");
  const snap = await appRef.get();
  if (snap.exists && snap.data().seeded) return;
  const anyRep = await db.collection("reps").limit(1).get();
  if (!anyRep.empty) {
    await appRef.set({ seeded: true }, { merge: true });
    return;
  }
  const batch = db.batch();
  batch.set(appRef, { regions: initialRegions, seeded: true });
  for (const rep of initialSalesReps) {
    const rid = String(rep.id);
    const rRef = db.collection("reps").doc(rid);
    batch.set(rRef, {
      name: rep.name,
      region: rep.region,
      phone: rep.phone,
      joinDate: rep.joinDate,
      status: rep.status,
    });
    for (const st of rep.stores) {
      const sRef = db.collection("stores").doc();
      batch.set(sRef, {
        repId: rid,
        name: st.name,
        type: st.type,
        date: st.date,
        activated: !!st.activated,
        note: st.note || "",
        address: st.address || "",
      });
    }
  }
  for (const v of initialVisitsSeed) {
    const vRef = db.collection("visits").doc();
    batch.set(vRef, { repId: "1", name: v.name, address: v.address || "", date: v.date, result: v.result, note: v.note || "" });
  }
  await batch.commit();
}

/** 방문 기록 행: GPS·거리 표시 또는 미인증 배지 */
function NeoHqFormatFsTime(t) {
  if (t == null) return "—";
  try {
    if (typeof t.toDate === "function") {
      const d = t.toDate();
      if (!isNaN(d.getTime())) return d.toLocaleString("ko-KR");
    }
    if (typeof t.toMillis === "function") {
      const ms = t.toMillis();
      if (Number.isFinite(ms)) return new Date(ms).toLocaleString("ko-KR");
    }
    if (typeof t === "object" && typeof t.seconds === "number") {
      return new Date(t.seconds * 1000).toLocaleString("ko-KR");
    }
  } catch (e) { /* ignore */ }
  return "—";
}

function NeoHqVisitGpsCell({ visit }) {
  const g = visit && visit.gps;
  const ok = g && typeof g.lat === "number" && typeof g.lng === "number" && Number.isFinite(g.lat) && Number.isFinite(g.lng);
  if (!ok) {
    return <Badge color="red">위치 미인증</Badge>;
  }
  const lat = g.lat.toFixed(5);
  const lng = g.lng.toFixed(5);
  const d = g.distanceFromStore;
  const hasDist = typeof d === "number" && Number.isFinite(d);
  return (
    <div style={{ display: "flex", flexDirection: "column", gap: 4, alignItems: "flex-start", maxWidth: 280 }}>
      <span style={{ fontSize: 12, color: "#374151", fontFamily: "ui-monospace, monospace", wordBreak: "break-all" }}>{lat}, {lng}</span>
      {hasDist ? (
        <span style={{ fontSize: 12, fontWeight: 600, color: "#028090" }}>업체에서 {Math.round(d)}m</span>
      ) : null}
    </div>
  );
}

function RepChatPanel({ repId, isAdmin }) {
  const [messages, setMessages] = useState([]);
  const [text, setText] = useState("");
  const [sending, setSending] = useState(false);
  const [linkUrl, setLinkUrl] = useState("");
  const [linkTitle, setLinkTitle] = useState("");
  const [linkSending, setLinkSending] = useState(false);
  const bottomRef = useRef(null);
  useEffect(() => {
    const db = firebase.firestore();
    const unsub = db.collection("chats").doc(String(repId)).collection("messages")
      .orderBy("createdAt", "asc").limit(200)
      .onSnapshot(snap => setMessages(snap.docs.map(d => ({ id: d.id, ...d.data() }))), err => console.error(err));
    return () => unsub();
  }, [repId]);
  useEffect(() => {
    bottomRef.current && bottomRef.current.scrollIntoView({ behavior: "smooth" });
  }, [messages.length]);
  const send = async () => {
    const t = text.trim();
    if (!t || sending) return;
    setSending(true);
    try {
      const db = firebase.firestore();
      await db.collection("chats").doc(String(repId)).collection("messages").add({
        from: isAdmin ? "admin" : "rep",
        text: t,
        createdAt: new Date().toISOString(),
      });
      setText("");
    } catch (e) {
      alert("전송 실패: " + ((e && e.message) || e));
    } finally {
      setSending(false);
    }
  };
  const sendLink = async () => {
    if (!isAdmin || linkSending) return;
    let u = (linkUrl || "").trim();
    if (!u) {
      alert("링크 주소를 입력해 주세요.");
      return;
    }
    if (!/^https?:\/\//i.test(u)) u = NEO_PUBLIC_URL_SCHEME + u.replace(/^\/+/, "");
    if (u.length > 2048) {
      alert("링크가 너무 깁니다.");
      return;
    }
    try {
      new URL(u);
    } catch (e) {
      alert("올바른 URL 형식인지 확인해 주세요.");
      return;
    }
    const title = (linkTitle || "").trim();
    const lineText = "[링크] " + (title || u);
    setLinkSending(true);
    try {
      const db = firebase.firestore();
      await db.collection("chats").doc(String(repId)).collection("messages").add({
        from: "admin",
        kind: "link",
        url: u,
        linkTitle: title,
        text: lineText,
        createdAt: new Date().toISOString(),
      });
      setLinkUrl("");
      setLinkTitle("");
    } catch (e) {
      alert("링크 전송 실패: " + ((e && e.message) || e));
    } finally {
      setLinkSending(false);
    }
  };
  const bubbleInner = (m, mine) => {
    if (m.kind === "link" && m.url) {
      const u = String(m.url).trim();
      const label = (m.linkTitle && String(m.linkTitle).trim()) || u;
      return (
        <div style={{ lineHeight: 1.45 }}>
          <div style={{ fontSize: 10, opacity: 0.9, marginBottom: 4 }}>🔗 링크</div>
          <a href={u} target="_blank" rel="noopener noreferrer" onClick={e => e.stopPropagation()} style={{
            color: mine ? "#fff" : "#028090", fontWeight: 700, textDecoration: "underline", wordBreak: "break-all", fontSize: 13,
          }}>{label}</a>
          {m.linkTitle ? <div style={{ fontSize: 10, marginTop: 6, opacity: 0.85, wordBreak: "break-all" }}>{u}</div> : null}
        </div>
      );
    }
    return m.text;
  };
  return (
    <div style={{ border: "1px solid #E5E7EB", borderRadius: 12, overflow: "hidden", background: "#F8FAFB" }}>
      <div style={{ padding: "10px 14px", fontSize: 13, fontWeight: 700, color: "#1A1A2E", background: "#fff", borderBottom: "1px solid #E5E7EB" }}>실시간 메시지 (담당 ID {repId})</div>
      {isAdmin ? (
        <div style={{ padding: "12px 14px", background: "#ECFEFF", borderBottom: "1px solid #99F6E4" }}>
          <div style={{ fontSize: 12, fontWeight: 700, color: "#0F766E", marginBottom: 8 }}>링크 보내기</div>
          <input value={linkUrl} onChange={e => setLinkUrl(e.target.value)} placeholder="http://… (영업사원 앱에 표시됩니다)"
            style={{ width: "100%", padding: "8px 10px", borderRadius: 8, border: "1px solid #99F6E4", fontSize: 13, boxSizing: "border-box", marginBottom: 8 }} />
          <input value={linkTitle} onChange={e => setLinkTitle(e.target.value)} placeholder="버튼에 보일 제목 (선택)"
            style={{ width: "100%", padding: "8px 10px", borderRadius: 8, border: "1px solid #99F6E4", fontSize: 13, boxSizing: "border-box", marginBottom: 8 }} />
          <button type="button" onClick={sendLink} disabled={linkSending || !(linkUrl || "").trim()} style={{
            width: "100%", padding: "9px 12px", borderRadius: 8, border: "none", cursor: linkSending || !(linkUrl || "").trim() ? "not-allowed" : "pointer",
            fontWeight: 700, fontSize: 12, background: linkSending || !(linkUrl || "").trim() ? "#D1D5DB" : "#028090", color: "#fff",
          }}>{linkSending ? "전송 중…" : "영업사원에게 링크 전송"}</button>
        </div>
      ) : null}
      <div style={{ height: 280, overflowY: "auto", padding: 12, display: "flex", flexDirection: "column", gap: 8 }}>
        {messages.length === 0 ? (
          <div style={{ fontSize: 13, color: "#9CA3AF", textAlign: "center", padding: 24 }}>대화가 없습니다. 아래에서 메시지를 보내세요.</div>
        ) : (
          messages.map(m => {
            const mine = (isAdmin && m.from === "admin") || (!isAdmin && m.from === "rep");
            return (
              <div key={m.id} style={{ alignSelf: mine ? "flex-end" : "flex-start", maxWidth: "85%" }}>

                <div style={{
                  padding: "8px 12px", borderRadius: 12, fontSize: 13, lineHeight: 1.45, whiteSpace: m.kind === "link" ? "normal" : "pre-wrap", wordBreak: "break-word",
                  background: mine ? "linear-gradient(135deg, #028090, #00A896)" : "#fff",

                  border: mine ? "none" : "1px solid #E5E7EB",

              </div>
            );
          })
        )}
        <div ref={bottomRef} />
      </div>
      <div style={{ display: "flex", gap: 8, padding: 10, background: "#fff", borderTop: "1px solid #E5E7EB" }}>

        <button type="button" onClick={send} disabled={sending || !text.trim()} style={{
          padding: "0 18px", borderRadius: 10, border: "none", cursor: sending || !text.trim() ? "not-allowed" : "pointer",
          fontWeight: 700, fontSize: 13, background: sending || !text.trim() ? "#D1D5DB" : "#028090", color: "#fff",
        }}>전송</button>
      </div>
    </div>
  );
}

        date: s.date,
        activated: !!s.activated,
        note: s.note || "",
        address: s.address || "",
        storeGps: s.storeGps || null,
      })),
    }));
  }, [repRows, storeRows]);

  const visitsForSelectedRep = useMemo(() => {
    if (!selectedRep) return [];
    const rid = String(selectedRep.id);
    return visitRows
      .filter(v => String(v.repId) === rid)
      .sort((a, b) => {
        const da = a.date || "";
        const db = b.date || "";
        if (db !== da) return db.localeCompare(da);
        return String(b.id || "").localeCompare(String(a.id || ""));
      });
  }, [visitRows, selectedRep]);

  const dashboardRecentVisits = useMemo(() => {
    const tsMs = v => {
      const g = v && v.gps;
      if (!g || !g.timestamp) return 0;
      const t = g.timestamp;
      if (typeof t.toMillis === "function") return t.toMillis();
      if (typeof t === "object" && typeof t.seconds === "number") {
        return t.seconds * 1000 + Math.floor((t.nanoseconds || 0) / 1e6);
      }
      return 0;
    };
    return [...visitRows].sort((a, b) => tsMs(b) - tsMs(a)).slice(0, 15);
  }, [visitRows]);

  const fieldAppUrl = useMemo(() => getNeoFieldAppUrl(), []);
  const hqAppUrl = useMemo(() => getNeoHqAppUrl(), []);
  const publicOrigin = useMemo(() => getNeoPublicOrigin(), []);
  const salesBridgeUrl = useMemo(() => getNeoSalesBridgeUrl(), []);
  const adminBridgeUrl = useMemo(() => getNeoAdminBridgeUrl(), []);
  const hubRootUrl = useMemo(() => (publicOrigin ? publicOrigin + "/" : ""), [publicOrigin]);

  const markShareCopied = (key) => {
    setShareCopiedKey(key);
    if (shareCopyTimerRef.current) window.clearTimeout(shareCopyTimerRef.current);
    shareCopyTimerRef.current = window.setTimeout(() => setShareCopiedKey(""), 2200);
  };

  useEffect(() => () => {
    if (shareCopyTimerRef.current) window.clearTimeout(shareCopyTimerRef.current);
  }, []);

  const copyShareUrl = (url, key) => {
    if (!url) {
      window.alert("주소를 만들 수 없습니다. firebase-config.js의 projectId를 확인하거나, 수동으로 https://(프로젝트).web.app 형태를 입력해 주세요.");
      return;
    }
    neoCopyToClipboard(url).then(() => markShareCopied(key)).catch(() => window.alert("복사에 실패했습니다. 주소를 길게 눌러 직접 복사해 주세요."));
  };

  const copyFieldAppUrl = () => {
    const u = fieldAppUrl || getNeoFieldAppUrl();
    if (!u) {
      window.alert("영업사원 앱 주소를 만들 수 없습니다. firebase-config.js의 projectId를 확인하거나, firebase-config.js에서 window.__NEO_FIELD_APP_URL__ 에 https://…/f 형태(또는 전체 주소)로 직접 넣을 수 있습니다.");
      return;
    }
    copyShareUrl(u, "field");
  };

  useEffect(() => {
    const cfg = window.__NEO_FIREBASE_CONFIG__;
    if (!cfg || !cfg.apiKey || String(cfg.apiKey).indexOf("YOUR_") === 0) {
      setLoadState({ loading: false, error: "neo 폴더의 firebase-config.js에 Firebase 웹 앱 설정값을 넣어주세요." });
      return;
    }
    let unsubReps, unsubStores, unsubVisits, unsubSettings, unsubJoinRequests, unsubStoreDeleteRequests;
    (async () => {
      try {
        if (!firebase.apps.length) firebase.initializeApp(cfg);
        if (typeof window.neoActivateAppCheckIfConfigured === "function") window.neoActivateAppCheckIfConfigured();
        const db = firebase.firestore();
        await ensureNeoSeed(db);
        unsubSettings = db.collection("settings").doc("app").onSnapshot(doc => {
          const d = doc.data();
          setRegions(Array.isArray(d && d.regions) ? d.regions : []);
        });
        unsubReps = db.collection("reps").onSnapshot(snap => {
          setRepRows(snap.docs.map(d => ({ id: d.id, ...d.data() })));
        });
        unsubStores = db.collection("stores").onSnapshot(snap => {
          setStoreRows(snap.docs.map(d => ({ id: d.id, ...d.data() })));
        });
        unsubVisits = db.collection("visits").onSnapshot(snap => {
          setVisitRows(snap.docs.map(d => ({ id: d.id, ...d.data() })));
        });
        unsubJoinRequests = db.collection("rep_join_requests").where("status", "==", "pending").onSnapshot(
          snap => setJoinRequests(snap.docs.map(d => ({ id: d.id, ...d.data() }))),
          err => console.error(err)
        );
        unsubStoreDeleteRequests = db.collection("store_deletion_requests").where("status", "==", "pending").onSnapshot(
          snap => setStoreDeleteRequests(snap.docs.map(d => ({ id: d.id, ...d.data() }))),
          err => console.error(err)
        );
        setLoadState({ loading: false, error: "" });
      } catch (e) {
        console.error(e);
        setLoadState({ loading: false, error: (e && e.message) || String(e) });
      }
    })();
    return () => {
      if (unsubReps) unsubReps();
      if (unsubStores) unsubStores();
      if (unsubVisits) unsubVisits();
      if (unsubSettings) unsubSettings();
      if (unsubJoinRequests) unsubJoinRequests();
      if (unsubStoreDeleteRequests) unsubStoreDeleteRequests();
    };
  }, []);

  useEffect(() => {
    if (loadState.loading || loadState.error) {
      setActivityTrackReady(false);
      activityBaselineRef.current = false;
      prevRepIdsRef.current = null;
      prevStoreIdsRef.current = null;
      prevVisitIdsRef.current = null;
      return undefined;
    }
    const id = setTimeout(() => setActivityTrackReady(true), 1500);
    return () => clearTimeout(id);
  }, [loadState.loading, loadState.error]);

  useEffect(() => {
    if (loadState.loading || loadState.error || !activityTrackReady) return;
    const repById = Object.fromEntries(repRows.map(r => [String(r.id), r]));
    const nextRep = new Set(repRows.map(r => r.id));
    const nextStore = new Set(storeRows.map(s => s.id));
    const nextVisit = new Set(visitRows.map(v => v.id));
    if (!activityBaselineRef.current) {
      activityBaselineRef.current = true;
      prevRepIdsRef.current = nextRep;
      prevStoreIdsRef.current = nextStore;
      prevVisitIdsRef.current = nextVisit;
      return;
    }
    const prevR = prevRepIdsRef.current;
    const prevS = prevStoreIdsRef.current;
    const prevV = prevVisitIdsRef.current;
    repRows.forEach(r => {
      if (!prevR.has(r.id)) sendNeoAdminNotification("NeoRabbit · 신규 영업사원", (r.name || "") + " 님이 등록되었습니다.");
    });
    storeRows.forEach(s => {
      if (!prevS.has(s.id)) {
        const rn = repById[String(s.repId)] && repById[String(s.repId)].name ? repById[String(s.repId)].name : "담당자";
        sendNeoAdminNotification("NeoRabbit · 신규 입점", (s.name || "업체") + " · " + rn);
      }
    });
    visitRows.forEach(v => {
      if (!prevV.has(v.id)) sendNeoAdminNotification("NeoRabbit · 신규 방문 기록", (v.name || "업체") + " · " + (v.result || ""));
    });
    prevRepIdsRef.current = nextRep;
    prevStoreIdsRef.current = nextStore;
    prevVisitIdsRef.current = nextVisit;
  }, [repRows, storeRows, visitRows, loadState.loading, loadState.error, activityTrackReady]);

  const enableBrowserNotifications = async () => {
    if (typeof Notification === "undefined") {
      alert("이 브라우저는 알림을 지원하지 않습니다.");
      return;
    }
    const p = await Notification.requestPermission();
    if (p === "granted") {
      try {
        localStorage.setItem("neo_admin_notif", "1");
      } catch (e) { /* ignore */ }
      setNotifEnabled(true);
      setNotifBanner("브라우저 알림이 켜졌습니다. 이 탭이 열려 있거나 백그라운드일 때 신규 활동을 알려 드립니다.");
      sendNeoAdminNotification("NeoRabbit", "신규 활동 알림이 설정되었습니다.");
    } else {
      setNotifBanner("알림 권한이 거절되었습니다. 브라우저 설정에서 이 사이트 알림을 허용해 주세요.");
    }
  };

  useEffect(() => {
    setSelectedRep(prev => {
      if (!prev) return prev;
      const next = reps.find(r => String(r.id) === String(prev.id));
      return next !== undefined ? next : prev;
    });
  }, [reps]);

  const filtered = selectedRegion === "전체" ? reps : reps.filter(r => r.region === selectedRegion);
  const totalStores = reps.reduce((a, r) => a + r.stores.length, 0);
  const activatedStores = reps.reduce((a, r) => a + r.stores.filter(s => s.activated).length, 0);
  const totalIncentive = reps.reduce((a, r) => a + r.stores.length * 20000 + r.stores.filter(s => s.activated).length * 10000, 0);
  const activeReps = reps.filter(r => r.status === "active").length;

  const regionStats = regions.map(region => {
    const regionReps = reps.filter(r => r.region === region);
    const stores = regionReps.reduce((a, r) => a + r.stores.length, 0);
    const activated = regionReps.reduce((a, r) => a + r.stores.filter(s => s.activated).length, 0);
    return { region, reps: regionReps.length, stores, activated };
  });

  const handleAddRep = async () => {
    if (!newRep.name || !newRep.region || !newRep.phone) return;
    try {
      const db = firebase.firestore();
      await db.collection("reps").add({
        name: newRep.name,
        region: newRep.region,
        phone: newRep.phone,
        joinDate: new Date().toISOString().slice(0, 10),
        status: "active",
      });
      setNewRep({ name: "", region: "", phone: "" });
      setShowAddRep(false);
    } catch (e) {
      alert("저장 실패: " + ((e && e.message) || e));
    }
  };

  const handleAddRegion = async () => {
    const trimmed = newRegion.trim();
    if (!trimmed || regions.includes(trimmed)) return;
    try {
      const db = firebase.firestore();
      const ref = db.collection("settings").doc("app");
      const doc = await ref.get();
      const cur = (doc.exists && Array.isArray(doc.data().regions)) ? doc.data().regions : [];
      await ref.set({ regions: [...cur, trimmed], seeded: true }, { merge: true });
      setNewRegion("");
      setShowAddRegion(false);
    } catch (e) {
      alert("저장 실패: " + ((e && e.message) || e));
    }
  };

  const handleDeleteRegion = async (regionToDelete) => {
    if (reps.some(r => r.region === regionToDelete)) {
      alert('"' + regionToDelete + '" 지역에 소속된 매니저가 있어 삭제할 수 없습니다.');
      return;
    }
    try {
      const db = firebase.firestore();
      const ref = db.collection("settings").doc("app");
      const doc = await ref.get();
      const cur = (doc.exists && Array.isArray(doc.data().regions)) ? doc.data().regions : [];
      await ref.set({ regions: cur.filter(r => r !== regionToDelete) }, { merge: true });
      if (selectedRegion === regionToDelete) setSelectedRegion("전체");
    } catch (e) {
      alert("삭제 실패: " + ((e && e.message) || e));
    }
  };

  const handleToggleStatus = async (repId) => {
    const r = reps.find(x => String(x.id) === String(repId));
    if (!r) return;
    const next = r.status === "active" ? "inactive" : "active";
    try {
      const db = firebase.firestore();
      await db.collection("reps").doc(String(repId)).update({ status: next });
    } catch (e) {
      alert("상태 변경 실패: " + ((e && e.message) || e));
    }
  };

  const handleApproveJoin = async req => {
    const uid = String(req.id);
    if (!window.confirm("이 요청을 승인하고 영업사원 문서·프로필을 자동 생성할까요?")) return;
    try {
      const db = firebase.firestore();
      const profSnap = await db.collection("profiles").doc(uid).get();
      if (profSnap.exists && profSnap.data().role === "rep" && profSnap.data().repId) {
        alert("이미 영업사원 프로필이 있습니다. Firestore에서 확인해 주세요.");
        return;
      }
      const repRef = db.collection("reps").doc();
      const batch = db.batch();
      batch.set(repRef, {
        name: req.name,
        region: req.region,
        phone: req.phone,
        joinDate: new Date().toISOString().slice(0, 10),
        status: "active",
      });
      batch.set(db.collection("profiles").doc(uid), { role: "rep", repId: repRef.id }, { merge: true });
      batch.update(db.collection("rep_join_requests").doc(uid), {
        status: "approved",
        approvedRepId: repRef.id,
        approvedAt: new Date().toISOString(),
      });
      await batch.commit();
    } catch (e) {
      alert("승인 실패: " + ((e && e.message) || e));
    }
  };

  const handleRejectJoin = async req => {
    const uid = String(req.id);
    if (!window.confirm("이 가입 요청을 거절할까요?")) return;
    try {
      await firebase.firestore().collection("rep_join_requests").doc(uid).update({
        status: "rejected",
        rejectedAt: new Date().toISOString(),
      });
    } catch (e) {
      alert("처리 실패: " + ((e && e.message) || e));
    }
  };

  const handleApproveStoreDeleteRequest = async req => {
    const sid = String(req.storeId || "");
    const reqDocId = String(req.id);
    if (!sid || !reqDocId) return;
    if (!window.confirm("이 업체를 삭제하고 요청을 닫을까요? 되돌릴 수 없습니다.")) return;
    try {
      const db = firebase.firestore();
      const batch = db.batch();
      batch.delete(db.collection("stores").doc(sid));
      batch.delete(db.collection("store_deletion_requests").doc(reqDocId));
      await batch.commit();
    } catch (e) {
      alert("처리 실패: " + ((e && e.message) || e));
    }
  };

  const handleRejectStoreDeleteRequest = async req => {
    const reqDocId = String(req.id);
    if (!reqDocId) return;
    if (!window.confirm("요청만 제거할까요? 업체 데이터는 그대로 둡니다.")) return;
    try {
      await firebase.firestore().collection("store_deletion_requests").doc(reqDocId).delete();
    } catch (e) {
      alert("처리 실패: " + ((e && e.message) || e));
    }
  };

  const publishRepAnnouncement = async () => {
    const title = announceTitle.trim();
    const body = announceBody.trim();
    if (!title || !body) {
      alert("제목과 내용을 모두 입력해 주세요.");
      return;
    }
    setAnnounceSaving(true);
    try {
      const db = firebase.firestore();
      const ref = db.collection("settings").doc("rep_announcement");
      const snap = await ref.get();
      const raw = snap.exists ? snap.data().version : 0;
      const prev = typeof raw === "number" && !Number.isNaN(raw) ? Math.floor(raw) : 0;
      await ref.set({
        title,
        body,
        version: prev + 1,
        updatedAt: new Date().toISOString(),
      }, { merge: true });
      setShowAnnounceModal(false);
      setAnnounceTitle("");
      setAnnounceBody("");
      alert("영업사원 앱에 새 공지가 반영되었습니다.");
    } catch (e) {
      alert("저장 실패: " + ((e && e.message) || e));
    } finally {
      setAnnounceSaving(false);
    }
  };

  const commitDeleteRep = async () => {
    if (!repPendingDelete) return;
    const rid = String(repPendingDelete.id);
    try {
      const db = firebase.firestore();
      const runBatchDeletes = async (snap) => {
        let batch = db.batch();
        let n = 0;
        for (let i = 0; i < snap.docs.length; i++) {
          batch.delete(snap.docs[i].ref);
          n++;
          if (n >= 400) {
            await batch.commit();
            batch = db.batch();
            n = 0;
          }
        }
        if (n > 0) await batch.commit();
      };
      const storesSnap = await db.collection("stores").where("repId", "==", rid).get();
      await runBatchDeletes(storesSnap);
      const visitsSnap = await db.collection("visits").where("repId", "==", rid).get();
      await runBatchDeletes(visitsSnap);
      const delReqSnap = await db.collection("store_deletion_requests").where("repId", "==", rid).get();
      await runBatchDeletes(delReqSnap);
      await db.collection("reps").doc(rid).delete();
      setShowDeleteRepModal(false);
      setRepPendingDelete(null);
      if (selectedRep && String(selectedRep.id) === rid) setSelectedRep(null);
    } catch (e) {
      alert("삭제 실패: " + ((e && e.message) || e));
    }
  };

  if (loadState.loading) {
    return (
      <div style={{ minHeight: "100vh", background: "#F8FAFB", display: "flex", alignItems: "center", justifyContent: "center", flexDirection: "column", gap: 12 }}>
        <div style={{ fontSize: 15, color: "#6B7280" }}>Firestore에 연결하는 중…</div>
      </div>
    );
  }
  if (loadState.error) {
    return (
      <div style={{ minHeight: "100vh", background: "#F8FAFB", display: "flex", alignItems: "center", justifyContent: "center", padding: 24 }}>
        <div style={{ color: "#DC2626", maxWidth: 440, textAlign: "center", lineHeight: 1.6, fontSize: 14 }}>{loadState.error}</div>
      </div>
    );
  }

  return (
    <div style={{ minHeight: "100vh", background: "#F8FAFB" }}>
      {/* Header */}
      <div style={{ background: "linear-gradient(135deg, #028090 0%, #00A896 100%)", padding: "16px 24px", display: "flex", alignItems: "center", justifyContent: "space-between", flexWrap: "wrap", gap: 12 }}>
        <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
          <div style={{ width: 34, height: 34, borderRadius: 9, background: "rgba(255,255,255,0.2)", display: "flex", alignItems: "center", justifyContent: "center", fontSize: 17 }}>🐰</div>
          <div>
            <div style={{ color: "#fff", fontSize: 17, fontWeight: 800, letterSpacing: -0.5 }}>네오래빗 본사 관리</div>
            <div style={{ color: "rgba(255,255,255,0.65)", fontSize: 11 }}>관리자 전용 · 영업사원 앱(현장_영업사원.html)과 다름</div>
          </div>
        </div>
        <div style={{ display: "flex", gap: 6, flexWrap: "wrap", alignItems: "center" }}>
          {["dashboard", "reps", "regions", "requests", "delreq"].map(v => (
            <button key={v} onClick={() => { setView(v); setSelectedRep(null); }} style={{
              padding: "7px 16px", borderRadius: 8, border: "none", cursor: "pointer", fontSize: 13, fontWeight: 600, transition: "all 0.2s",
              background: view === v ? "#fff" : "rgba(255,255,255,0.15)", color: view === v ? "#028090" : "#fff",
            }}>
              {v === "dashboard" ? "대시보드" : v === "reps" ? "영업사원" : v === "regions" ? "지역 관리" : v === "requests" ? "가입 요청" + (joinRequests.length ? " (" + joinRequests.length + ")" : "") : "업체 삭제" + (storeDeleteRequests.length ? " (" + storeDeleteRequests.length + ")" : "")}
            </button>
          ))}
          <button type="button" onClick={() => setShowAnnounceModal(true)} style={{
            padding: "7px 12px", borderRadius: 8, border: "1px solid rgba(255,255,255,0.45)", cursor: "pointer", fontSize: 12, fontWeight: 600,
            background: "rgba(0,0,0,0.08)", color: "#fff",
          }}>공지 작성</button>
          <button type="button" onClick={enableBrowserNotifications} style={{
            padding: "7px 12px", borderRadius: 8, border: "1px solid rgba(255,255,255,0.45)", cursor: "pointer", fontSize: 12, fontWeight: 600,
            background: notifEnabled ? "rgba(255,255,255,0.25)" : "rgba(0,0,0,0.08)", color: "#fff",
          }}>{notifEnabled ? "알림 켜짐" : "신규 알림 켜기"}</button>
          <button type="button" onClick={() => neoHqSignOut()} style={{
            padding: "7px 14px", borderRadius: 8, border: "1px solid rgba(255,255,255,0.4)", cursor: "pointer", fontSize: 12, fontWeight: 600,
            background: "rgba(0,0,0,0.08)", color: "#fff",
          }}>로그아웃</button>
        </div>
      </div>

      <div style={{ maxWidth: 1100, margin: "0 auto", padding: "12px 16px 0" }}>
        <div style={{
          background: "#fff", borderRadius: 14, padding: "14px 16px",
          border: "1px solid #E5E7EB", boxShadow: "0 1px 3px rgba(0,0,0,0.04)",
        }}>
          <div style={{ fontSize: 13, fontWeight: 800, color: "#1A1A2E", marginBottom: 4 }}>공유 주소 만들기 · 복사</div>
          <div style={{ fontSize: 11, color: "#6B7280", marginBottom: 12, lineHeight: 1.45 }}>
            카카오톡·문자에 붙여넣기 할 주소입니다. 모두 <b>영문 경로</b>입니다. 칸을 눌러 전체 선택 후 복사해도 됩니다.
          </div>
          <div style={{ display: "flex", flexDirection: "column", gap: 10 }}>
            {[
              { label: "현장 앱 (영업사원)", sub: "/f", val: fieldAppUrl || "", k: "field" },
              { label: "본사 관리 (어드민)", sub: "/h", val: hqAppUrl || "", k: "hq" },
              { label: "영업 안내 페이지", sub: "/sales", val: salesBridgeUrl || "", k: "sales" },
              { label: "어드민 안내 페이지", sub: "/admin-check", val: adminBridgeUrl || "", k: "adminb" },
              { label: "메인 안내", sub: "루트", val: hubRootUrl || "", k: "hub" },
            ].map(row => (
              <div key={row.k} style={{ display: "flex", gap: 8, flexWrap: "wrap", alignItems: "stretch" }}>
                <div style={{ flex: "0 0 132px", minWidth: 88 }}>
                  <div style={{ fontSize: 12, fontWeight: 700, color: "#374151" }}>{row.label}</div>
                  <div style={{ fontSize: 10, color: "#9CA3AF" }}>{row.sub}</div>
                </div>
                <input readOnly value={row.val || "(주소 없음 — firebase-config 확인)"} onFocus={e => e.target.select()}
                  style={{
                    flex: "1 1 200px", minWidth: 0, padding: "8px 10px", borderRadius: 10, border: "1px solid #E5E7EB",

        {/* JOIN REQUESTS */}
        {view === "requests" && (<React.Fragment>
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 18, flexWrap: "wrap", gap: 12 }}>
            <h2 style={{ margin: 0, fontSize: 20, fontWeight: 800, color: "#1A1A2E" }}>영업사원 앱 가입 요청</h2>
            <p style={{ margin: 0, fontSize: 12, color: "#6B7280", maxWidth: 480, lineHeight: 1.5 }}>앱에서 정보를 제출한 사용자입니다. 승인 시 reps 문서와 해당 UID의 profiles가 자동 생성됩니다.</p>
          </div>
          <div style={{
            marginBottom: 18, background: "#fff", borderRadius: 14, padding: "16px 18px", boxShadow: "0 1px 3px rgba(0,0,0,0.06)",
            border: "1px solid #E5E7EB",
          }}>
            <div style={{ fontSize: 13, fontWeight: 700, color: "#1A1A2E", marginBottom: 8 }}>영업사원 앱 주소</div>
            <p style={{ fontSize: 12, color: "#6B7280", lineHeight: 1.5, marginBottom: 10 }}>
              가입 요청자에게 아래 주소를 보내 두면, 해당 링크에서 앱을 연 뒤 로그인·가입 요청을 진행할 수 있습니다. 입력창에서 선택 후 붙여넣기 하거나 <b>주소 복사</b>를 누르세요.
            </p>
            <div style={{ display: "flex", gap: 10, flexWrap: "wrap", alignItems: "stretch" }}>
              <input
                readOnly
                value={fieldAppUrl || "(firebase-config.js의 projectId 등으로 주소를 만들 수 없습니다)"}
                onFocus={e => e.target.select()}
                style={{
                  flex: "1 1 220px", minWidth: 0, padding: "10px 12px", borderRadius: 10, border: "1px solid #E5E7EB",
                  fontSize: 12, fontFamily: "ui-monospace, monospace", background: "#F9FAFB", color: "#374151",
                }}
              />
              <button type="button" onClick={copyFieldAppUrl} style={{
                padding: "10px 20px", borderRadius: 10, border: "none", cursor: "pointer", fontWeight: 700, fontSize: 13,
                background: shareCopiedKey === "field" ? "#059669" : "linear-gradient(135deg, #028090, #00A896)", color: "#fff", flexShrink: 0,
              }}>{shareCopiedKey === "field" ? "복사됨" : "주소 복사"}</button>
            </div>
          </div>
          {joinRequests.length === 0 ? (
            <div style={{ background: "#fff", borderRadius: 16, padding: 48, textAlign: "center", boxShadow: "0 1px 3px rgba(0,0,0,0.06)", color: "#9CA3AF", fontSize: 14 }}>대기 중인 요청이 없습니다</div>
          ) : (
            <div style={{ display: "flex", flexDirection: "column", gap: 12 }}>
              {joinRequests.map(req => (
                <div key={req.id} style={{
                  background: "#fff", borderRadius: 14, padding: "18px 20px", boxShadow: "0 1px 3px rgba(0,0,0,0.06)",
                  borderLeft: "4px solid #F59E0B", display: "flex", flexWrap: "wrap", gap: 14, justifyContent: "space-between", alignItems: "flex-start",
                }}>
                  <div style={{ flex: "1 1 240px", minWidth: 0 }}>
                    <div style={{ fontSize: 16, fontWeight: 800, color: "#1A1A2E", marginBottom: 6 }}>{req.name}</div>
                    <div style={{ fontSize: 12, color: "#6B7280", lineHeight: 1.6 }}>
                      <div>연락처: {req.phone}</div>
                      <div>지역: {req.region}</div>
                      <div>이메일: {req.email || "—"}</div>
                      <div style={{ marginTop: 8, fontFamily: "ui-monospace, monospace", fontSize: 11, color: "#9CA3AF", wordBreak: "break-all" }}>Auth UID: {req.id}</div>
                    </div>
                  </div>
                  <div style={{ display: "flex", gap: 8, flexShrink: 0 }}>
                    <button type="button" onClick={() => handleApproveJoin(req)} style={{
                      padding: "10px 18px", borderRadius: 10, border: "none", cursor: "pointer", fontWeight: 700, fontSize: 13, background: "linear-gradient(135deg, #028090, #00A896)", color: "#fff",
                    }}>승인</button>
                    <button type="button" onClick={() => handleRejectJoin(req)} style={{
                      padding: "10px 18px", borderRadius: 10, border: "1px solid #FECACA", cursor: "pointer", fontWeight: 700, fontSize: 13, background: "#FEF2F2", color: "#DC2626",
                    }}>거절</button>
                  </div>
                </div>
              ))}
            </div>
          )}
        </React.Fragment>)}

        {/* STORE DELETE REQUESTS (영업사원 앱에서 요청) */}
        {view === "delreq" && (<React.Fragment>
          <div style={{ marginBottom: 18 }}>
            <h2 style={{ margin: "0 0 8px", fontSize: 20, fontWeight: 800, color: "#1A1A2E" }}>업체 삭제 요청</h2>
            <p style={{ margin: 0, fontSize: 12, color: "#6B7280", lineHeight: 1.55 }}>영업사원은 직접 삭제할 수 없습니다. 요청을 확인한 뒤 삭제하거나 요청만 닫으세요.</p>
          </div>
          {storeDeleteRequests.length === 0 ? (
            <div style={{ background: "#fff", borderRadius: 16, padding: 48, textAlign: "center", boxShadow: "0 1px 3px rgba(0,0,0,0.06)", color: "#9CA3AF", fontSize: 14 }}>대기 중인 삭제 요청이 없습니다</div>
          ) : (
            <div style={{ display: "flex", flexDirection: "column", gap: 12 }}>
              {storeDeleteRequests.map(req => {
                const repName = (repRows.find(r => String(r.id) === String(req.repId)) || {}).name || req.repId;
                return (
                  <div key={req.id} style={{
                    background: "#fff", borderRadius: 14, padding: "18px 20px", boxShadow: "0 1px 3px rgba(0,0,0,0.06)",
                    borderLeft: "4px solid #DC2626", display: "flex", flexWrap: "wrap", gap: 14, justifyContent: "space-between", alignItems: "flex-start",
                  }}>
                    <div style={{ flex: "1 1 280px", minWidth: 0 }}>
                      <div style={{ fontSize: 16, fontWeight: 800, color: "#1A1A2E", marginBottom: 6 }}>{req.storeName || "업체"}</div>
                      <div style={{ fontSize: 12, color: "#6B7280", lineHeight: 1.65 }}>
                        <div>담당: {repName} <span style={{ fontFamily: "ui-monospace, monospace", color: "#9CA3AF" }}>(repId {req.repId})</span></div>
                        <div style={{ marginTop: 4 }}>주소: {req.storeAddress || "—"}</div>
                        <div style={{ marginTop: 8, fontSize: 11, color: "#9CA3AF" }}>storeId: {req.storeId}</div>
                        <div style={{ marginTop: 8, fontSize: 12, color: "#374151", whiteSpace: "pre-wrap", wordBreak: "break-word" }}><b>사유</b> — {req.note || "—"}</div>
                        <div style={{ marginTop: 6, fontSize: 11, color: "#9CA3AF" }}>{req.createdAt || ""}</div>
                      </div>
                    </div>
                    <div style={{ display: "flex", gap: 8, flexShrink: 0, flexWrap: "wrap" }}>
                      <button type="button" onClick={() => handleApproveStoreDeleteRequest(req)} style={{
                        padding: "10px 18px", borderRadius: 10, border: "none", cursor: "pointer", fontWeight: 700, fontSize: 13, background: "#DC2626", color: "#fff",
                      }}>업체 삭제</button>
                      <button type="button" onClick={() => handleRejectStoreDeleteRequest(req)} style={{
                        padding: "10px 18px", borderRadius: 10, border: "1px solid #E5E7EB", cursor: "pointer", fontWeight: 700, fontSize: 13, background: "#F9FAFB", color: "#374151",
                      }}>요청만 닫기</button>
                    </div>
                  </div>
                );
              })}
            </div>
          )}
        </React.Fragment>)}

        {/* REGION MANAGEMENT */}
        {view === "regions" && (<React.Fragment>
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 20 }}>
            <h2 style={{ margin: 0, fontSize: 20, fontWeight: 800, color: "#1A1A2E" }}>지역 관리</h2>
            <button onClick={() => setShowAddRegion(true)} style={{
              padding: "9px 20px", borderRadius: 10, border: "none", cursor: "pointer", fontSize: 13, fontWeight: 700, color: "#fff",
              background: "linear-gradient(135deg, #028090, #00A896)",
            }}>+ 지역 추가</button>
          </div>
          {regions.length === 0 ? (
            <div style={{ background: "#fff", borderRadius: 16, padding: 60, textAlign: "center", boxShadow: "0 1px 3px rgba(0,0,0,0.06)" }}>
              <div style={{ fontSize: 40, marginBottom: 12 }}>📍</div>
              <div style={{ fontSize: 15, color: "#6B7280", marginBottom: 16 }}>등록된 지역이 없습니다</div>
              <button onClick={() => setShowAddRegion(true)} style={{ padding: "10px 24px", borderRadius: 10, border: "none", cursor: "pointer", fontSize: 13, fontWeight: 700, color: "#fff", background: "linear-gradient(135deg, #028090, #00A896)" }}>첫 거점 지역 추가하기</button>
            </div>
          ) : (
            <div style={{ display: "flex", flexDirection: "column", gap: 12 }}>
              {regions.map(region => {
                const regionReps = reps.filter(r => r.region === region);
                const stores = regionReps.reduce((a, r) => a + r.stores.length, 0);
                const activated = regionReps.reduce((a, r) => a + r.stores.filter(s => s.activated).length, 0);
                return (
                  <div key={region} style={{
                    background: "#fff", borderRadius: 14, padding: "20px 24px",
                    boxShadow: "0 1px 3px rgba(0,0,0,0.06), 0 4px 12px rgba(0,0,0,0.04)",
                    display: "flex", justifyContent: "space-between", alignItems: "center", flexWrap: "wrap", gap: 12,
                  }}>
                    <div style={{ display: "flex", alignItems: "center", gap: 14 }}>
                      <div style={{ width: 42, height: 42, borderRadius: 12, display: "flex", alignItems: "center", justifyContent: "center", fontSize: 18, background: "#E6FFFA", color: "#028090" }}>📍</div>
                      <div>
                        <div style={{ fontSize: 16, fontWeight: 700, color: "#1A1A2E" }}>{region}</div>
                        <div style={{ fontSize: 12, color: "#9CA3AF", marginTop: 2 }}>매니저 {regionReps.length}명 · 입점 {stores}곳 · 활성화 {activated}곳</div>
                      </div>
                    </div>
                    <button onClick={() => handleDeleteRegion(region)} style={{
                      padding: "6px 14px", borderRadius: 8, border: "1px solid #FECACA", background: "#FEF2F2", cursor: "pointer", fontSize: 12, fontWeight: 600, color: "#DC2626",
                    }}>삭제</button>
                  </div>
                );
              })}
            </div>
          )}
        </React.Fragment>)}
      </div>

      <Modal open={!!storeDetail} onClose={() => setStoreDetail(null)} maxWidth={560} title={storeDetail ? ("입점 상세 · " + (storeDetail.store.name || "")) : ""}>
        {storeDetail ? (
          <React.Fragment>
            <div style={{ fontSize: 12, color: "#6B7280", marginBottom: 16, lineHeight: 1.5 }}>
              영업사원 앱에서 입점 등록 시 입력·저장된 내용입니다.
            </div>
            <div style={{ marginBottom: 12 }}>
              <div style={{ fontSize: 11, fontWeight: 600, color: "#9CA3AF", marginBottom: 4 }}>담당 영업사원</div>
              <div style={{ fontSize: 14, color: "#1A1A2E" }}>{storeDetail.repName || "—"} <span style={{ color: "#6B7280" }}>({storeDetail.repRegion || "—"})</span></div>
              <div style={{ fontSize: 11, color: "#9CA3AF", marginTop: 6, fontFamily: "ui-monospace, monospace" }}>repId: {String(storeDetail.repId || "—")}</div>
            </div>
            <div style={{ marginBottom: 12 }}>
              <div style={{ fontSize: 11, fontWeight: 600, color: "#9CA3AF", marginBottom: 4 }}>업종</div>
              <div style={{ fontSize: 14, color: "#1A1A2E" }}>{storeDetail.store.type || "—"}</div>
            </div>
            <div style={{ marginBottom: 12 }}>
              <div style={{ fontSize: 11, fontWeight: 600, color: "#9CA3AF", marginBottom: 4 }}>주소</div>
              <div style={{ fontSize: 14, color: "#1A1A2E", whiteSpace: "pre-wrap", wordBreak: "break-word" }}>{(storeDetail.store.address && String(storeDetail.store.address).trim()) ? storeDetail.store.address : "—"}</div>
            </div>
            <div style={{ marginBottom: 12 }}>
              <div style={{ fontSize: 11, fontWeight: 600, color: "#9CA3AF", marginBottom: 4 }}>영업사원 메모 (입점 시 필수 입력)</div>
              <div style={{ fontSize: 14, color: "#1A1A2E", whiteSpace: "pre-wrap", wordBreak: "break-word", lineHeight: 1.55 }}>{(storeDetail.store.note && String(storeDetail.store.note).trim()) ? storeDetail.store.note : "—"}</div>
            </div>
            <div style={{ marginBottom: 12 }}>
              <div style={{ fontSize: 11, fontWeight: 600, color: "#9CA3AF", marginBottom: 4 }}>입점일 · 상태</div>
              <div style={{ fontSize: 14, color: "#1A1A2E" }}>{storeDetail.store.date || "—"} · {storeDetail.store.activated ? "활성화" : "미활성화"}</div>
            </div>
            <div style={{ marginBottom: 16 }}>
              <div style={{ fontSize: 11, fontWeight: 600, color: "#9CA3AF", marginBottom: 4 }}>Firestore 문서 ID</div>
              <div style={{ fontSize: 12, fontFamily: "ui-monospace, monospace", color: "#374151", wordBreak: "break-all" }}>{String(storeDetail.store.id || "—")}</div>
            </div>
            <NeoHqStoreGpsPanel storeGps={storeDetail.store.storeGps} />
            <div style={{ marginTop: 20, display: "flex", justifyContent: "flex-end" }}>
              <button type="button" onClick={() => setStoreDetail(null)} style={{ padding: "10px 22px", borderRadius: 10, border: "none", background: "#028090", color: "#fff", fontWeight: 700, cursor: "pointer" }}>닫기</button>
            </div>
          </React.Fragment>
        ) : null}
      </Modal>

      {/* ADD REP MODAL */}
      <Modal open={showAddRep} onClose={() => setShowAddRep(false)} title="영업사원 추가">
        <InputField label="이름" value={newRep.name} onChange={v => setNewRep(p => ({ ...p, name: v }))} placeholder="홍길동" />
        <SelectField label="담당 지역" value={newRep.region} onChange={v => setNewRep(p => ({ ...p, region: v }))} options={regions} />
        <InputField label="연락처" value={newRep.phone} onChange={v => setNewRep(p => ({ ...p, phone: v }))} placeholder="010-0000-0000" type="tel" />
        <div style={{ marginTop: 8 }}><PrimaryButton onClick={handleAddRep} disabled={!newRep.name || !newRep.region || !newRep.phone} full>추가하기</PrimaryButton></div>
      </Modal>

      {/* ADD REGION MODAL */}
      <Modal open={showAddRegion} onClose={() => setShowAddRegion(false)} title="거점 지역 추가">
        <InputField label="지역명" value={newRegion} onChange={setNewRegion} placeholder="예: 화성, 평택, 오산" />
        {regions.includes(newRegion.trim()) && newRegion.trim() && (
          <div style={{ fontSize: 12, color: "#DC2626", marginTop: -8, marginBottom: 12 }}>이미 등록된 지역입니다</div>
        )}
        <div style={{ marginTop: 8 }}><PrimaryButton onClick={handleAddRegion} disabled={!newRegion.trim() || regions.includes(newRegion.trim())} full>추가하기</PrimaryButton></div>
      </Modal>

      <Modal open={showAnnounceModal} onClose={() => { if (!announceSaving) { setShowAnnounceModal(false); setAnnounceTitle(""); setAnnounceBody(""); } }} title="영업사원 앱 공지">
        <p style={{ fontSize: 13, color: "#6B7280", marginBottom: 16, lineHeight: 1.5 }}>저장하면 영업사원 앱에 팝업으로 표시되며, 사원이 확인하면 다시 보지 않을 수 있습니다.</p>
        <InputField label="제목" value={announceTitle} onChange={setAnnounceTitle} placeholder="예: 4월 정산 일정 안내" />
        <div style={{ marginBottom: 16 }}>
          <label style={{ display: "block", fontSize: 13, fontWeight: 600, color: "#374151", marginBottom: 6 }}>내용</label>
          <textarea value={announceBody} onChange={e => setAnnounceBody(e.target.value)} placeholder="공지 본문" rows={6}
            style={{ width: "100%", padding: "10px 14px", borderRadius: 10, border: "1.5px solid #E5E7EB", fontSize: 14, boxSizing: "border-box", background: "#FAFAFA", resize: "vertical" }} />
        </div>
        <div style={{ display: "flex", gap: 10, justifyContent: "flex-end" }}>
          <button type="button" disabled={announceSaving} onClick={() => { setShowAnnounceModal(false); setAnnounceTitle(""); setAnnounceBody(""); }} style={{ padding: "10px 18px", borderRadius: 10, border: "1px solid #E5E7EB", background: "#fff", cursor: announceSaving ? "not-allowed" : "pointer", fontWeight: 600 }}>취소</button>
          <PrimaryButton onClick={publishRepAnnouncement} disabled={announceSaving || !announceTitle.trim() || !announceBody.trim()}>발송</PrimaryButton>
        </div>
      </Modal>

      <Modal open={showDeleteRepModal} onClose={() => { setShowDeleteRepModal(false); setRepPendingDelete(null); }} title="영업사원 삭제">
        {repPendingDelete && (
          <React.Fragment>
            <p style={{ fontSize: 14, color: "#374151", lineHeight: 1.6, marginBottom: 16 }}>
              <b>{repPendingDelete.name}</b> (담당 ID: {repPendingDelete.id}) 및 이 담당자의 <b>모든 입점·방문 기록</b>이 Firestore에서 삭제됩니다. 되돌릴 수 없습니다.
            </p>
            <div style={{ display: "flex", gap: 10, justifyContent: "flex-end" }}>
              <button type="button" onClick={() => { setShowDeleteRepModal(false); setRepPendingDelete(null); }} style={{ padding: "10px 18px", borderRadius: 10, border: "1px solid #E5E7EB", background: "#fff", cursor: "pointer", fontWeight: 600 }}>취소</button>
              <button type="button" onClick={commitDeleteRep} style={{ padding: "10px 18px", borderRadius: 10, border: "none", background: "#DC2626", color: "#fff", cursor: "pointer", fontWeight: 700 }}>삭제 실행</button>
            </div>
          </React.Fragment>
        )}
      </Modal>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<AdminLoginGate />);
</script>
</body>
</html>
