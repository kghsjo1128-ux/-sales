<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no">
<title>네오래빗 - 영업사원 어드민</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-check-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore-compat.js"></script>
<script src="firebase-config.js"></script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html {
  -webkit-text-size-adjust: 100%;
  height: 100%;
}
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  background: #F8FAFB;
  width: 100%;
  max-width: 100%;
  margin: 0;
  min-height: 100%;
  min-height: 100dvh;
  min-height: -webkit-fill-available;
  overflow-x: hidden;
}
#root {
  width: 100%;
  max-width: 100%;
  min-height: 100%;
  min-height: 100dvh;
  min-height: -webkit-fill-available;
}
button { font-family: inherit; }
input, select, textarea { font-family: inherit; }
/* 웹에서는 OS·하드웨어 캡처를 완전히 막을 수 없음. 복사·우클릭·일부 단축키·인쇄 시 내용 숨김으로 완화 */
.neo-capture-guard {
  width: 100%;
  max-width: 100%;
  min-height: 100%;
  min-height: 100dvh;
  min-height: -webkit-fill-available;
  -webkit-user-select: none;
  user-select: none;
  -webkit-touch-callout: none;
}
.neo-capture-guard input,
.neo-capture-guard textarea,
.neo-capture-guard select {
  -webkit-user-select: text;
  user-select: text;
}
@media print {
  .neo-capture-guard, .neo-capture-guard * { visibility: hidden !important; }
  body::after { content: ""; display: block; }
}
/* 폰·태블릿·데스크톱: 본문 폭 자동 제한 */
.neo-app-shell {
  width: 100%;
  max-width: 100%;
  margin-left: auto;
  margin-right: auto;
  box-sizing: border-box;
}
@media (min-width: 480px) {
  .neo-app-shell { max-width: 440px; }
}
@media (min-width: 640px) {
  .neo-app-shell { max-width: 560px; }
}
@media (min-width: 900px) {
  .neo-app-shell { max-width: 720px; }
}
@media (min-width: 1200px) {
  .neo-app-shell { max-width: 880px; }
}
@media (min-width: 720px) {
  .neo-stat-grid {
    grid-template-columns: repeat(4, minmax(0, 1fr)) !important;
  }
}
.neo-nav-bar {
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  z-index: 100;
  background: #fff;
  border-top: 1px solid #E5E7EB;
  box-sizing: border-box;
}
@media (min-width: 640px) {
  .neo-modal-out {
    align-items: center !important;
    justify-content: center !important;
    padding: max(16px, env(safe-area-inset-top)) max(16px, env(safe-area-inset-right)) max(16px, env(safe-area-inset-bottom)) max(16px, env(safe-area-inset-left)) !important;
  }
  .neo-modal-in {
    border-radius: 20px !important;
    max-width: min(520px, calc(100vw - 32px)) !important;
    max-height: min(88vh, 100dvh - 32px) !important;
  }
}

<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef } = React;

const STORE_TYPES = ["카페", "음식점", "미용실", "뷰티", "세탁소", "헬스장", "편의점", "기타"];

/** 휴대폰 노치·라운드 코너 대응 + 전 기종 가로폭 100% */
const NEO_SECTION_PAD = {
  paddingTop: 20,
  paddingBottom: 20,
  paddingLeft: "max(16px, env(safe-area-inset-left, 0px))",
  paddingRight: "max(16px, env(safe-area-inset-right, 0px))",
};

const SHARED_LOGIN_ID = "neorabbit";
const SHARED_AUTH_EMAIL = "neorabbit@neo-rabbit.app";
const SHARED_DEFAULT_REP_ID = "1";

/** 본사 HTML과 로그인 세션을 나눔(탭별 SESSION + 다른 화면이면 로그아웃). */
const NEO_AUTH_SURFACE_KEY = "neo_auth_surface";
const NEO_AUTH_SURFACE_FIELD = "field";

const NEO_FIELD_SAVED_LOGIN_ID_KEY = "neo_saved_login_id_field";
const NEO_FIELD_AUTH_SESSION_START_KEY = "neo_auth_session_started_field";
const NEO_AUTH_SESSION_DURATION_MS = 24 * 60 * 60 * 1000;

function neoReadSavedLoginIdField(key) {
  try { return localStorage.getItem(key) || ""; } catch (e) { return ""; }
}
function neoSaveSavedLoginIdField(key, rawId) {
  try {
    const s = String(rawId || "").trim();
    if (s) localStorage.setItem(key, s);
  } catch (e) { /* ignore */ }
}
function neoGetAuthSessionStartedField(key) {
  try {
    const v = localStorage.getItem(key);
    const n = v ? parseInt(v, 10) : 0;
    return n > 0 && !isNaN(n) ? n : null;
  } catch (e) { return null; }
}
function neoSetAuthSessionStartedField(key) {
  try { localStorage.setItem(key, String(Date.now())); } catch (e) {}
}
function neoClearAuthSessionStartedField(key) {
  try { localStorage.removeItem(key); } catch (e) {}
}
function neoAuthSessionExpiredField(key) {
  const t = neoGetAuthSessionStartedField(key);
  if (!t) return false;
  return Date.now() - t > NEO_AUTH_SESSION_DURATION_MS;
}
function neoFieldSignOut() {
  neoClearAuthSessionStartedField(NEO_FIELD_AUTH_SESSION_START_KEY);
  firebase.auth().signOut();
}

/** 인증 메일·Hosting 기본 URL 등에 쓰는 스킴(http / https). 알림은 https 페이지에서만 동작합니다. */
const NEO_PUBLIC_URL_SCHEME = "http://";

function neoRepExampleFieldUrl() {
  try {
    const cfg = window.__NEO_FIREBASE_CONFIG__ || {};
    const pid = cfg.projectId;
    if (typeof pid === "string" && pid && String(pid).indexOf("YOUR_") !== 0) {
      return NEO_PUBLIC_URL_SCHEME + pid + ".web.app/현장_영업사원.html";
    }
  } catch (e) { /* ignore */ }
  return NEO_PUBLIC_URL_SCHEME + "(배포주소).web.app/현장_영업사원.html";
}

/** 클릭 직후 동기로 권한 요청(일부 브라우저는 async 지연 시 거절). */
function requestNeoRepNotificationPermission(onGranted) {
  if (typeof Notification === "undefined") {
    alert("이 브라우저는 알림을 지원하지 않습니다.");
    return;
  }
  if (!window.isSecureContext) {
    alert("브라우저 알림은 보안 연결(https://)에서만 켤 수 있습니다.\n\n배포 주소 예: https://(프로젝트ID).web.app/현장_영업사원.html\n로컬은 http://localhost 만 알림이 허용되는 경우가 많습니다.");
    return;
  }
  const cur = Notification.permission;
  if (cur === "granted") {
    if (typeof onGranted === "function") onGranted();
    return;
  }
  if (cur === "denied") {
    alert("이미 알림이 차단된 상태입니다.\nChrome·Edge: 주소창 왼쪽 자물쇠(ⓘ) → 사이트 설정 → 알림을 「허용」으로 바꾼 뒤 페이지를 새로고침 해 주세요.");
    return;
  }
  try {
    const ret = Notification.requestPermission();
    const done = r => {
      const state = r === undefined || r === null ? "default" : r;
      if (state === "granted") {
        if (typeof onGranted === "function") onGranted();
        return;
      }
      if (state === "denied") {
        alert("알림이 거절되었습니다. 주소창 왼쪽 자물쇠(ⓘ)에서 이 사이트의 알림을 허용해 주세요.");
        return;
      }
      /* "default": 창을 닫았거나 아직 선택 안 함 — 오류가 아님 */
      if (state === "default") return;
      alert("알림 권한을 받지 못했습니다. (" + String(state) + ")");
    };
    if (ret && typeof ret.then === "function") {
      ret.then(done).catch(e => {
        alert("알림 요청 중 오류: " + ((e && e.message) || String(e)));
      });
    } else {
      done(typeof ret === "string" ? ret : "default");
    }
  } catch (e) {
    alert("알림 요청 실패: " + ((e && e.message) || String(e)));
  }
}

function sendNeoRepAdminChatNotification(msg, docId) {
  if (typeof Notification === "undefined" || Notification.permission !== "granted") return;
  const d = msg || {};
  let body = "새 메시지가 도착했습니다.";
  if (d.kind === "link" && d.url) {
    body = (d.linkTitle && String(d.linkTitle).trim()) || String(d.url).trim();
  } else if (d.text && String(d.text).trim()) {
    body = String(d.text).trim();
  }
  if (body.length > 200) body = body.slice(0, 197) + "…";
  try {
    new Notification("네오래빗 · 관리자", {
      body,
      tag: docId ? "neo-rep-msg-" + docId : "neo-rep-msg",
      requireInteraction: false,
    });
  } catch (e) { /* ignore */ }
}

function neoRepChatLastReadKey(repId) {
  return "neo_rep_chat_last_read_" + String(repId || "");
}

function getNeoRepChatLastRead(repId) {
  try {
    const raw = localStorage.getItem(neoRepChatLastReadKey(repId));
    if (!raw) return null;
    const j = JSON.parse(raw);
    if (j && typeof j.at === "string" && j.at) return { at: j.at, id: typeof j.id === "string" ? j.id : "" };
  } catch (e) { /* ignore */ }
  return null;
}

function setNeoRepChatLastRead(repId, createdAt, id) {
  if (!repId || !createdAt) return;
  try {
    localStorage.setItem(neoRepChatLastReadKey(repId), JSON.stringify({ at: createdAt, id: id || "" }));
  } catch (e) { /* ignore */ }
}

function announceVersionFromDoc(d) {
  if (!d || d.version == null) return 0;
  return typeof d.version === "number" ? d.version : parseInt(d.version, 10) || 0;
}

function loginIdToAuthEmail(raw) {
  const s = (raw || "").trim();
  if (!s) return s;
  if (s.indexOf("@") >= 0) return s;
  if (s.toLowerCase() === SHARED_LOGIN_ID) return SHARED_AUTH_EMAIL;
  return s;
}

function isSharedNeoRabbitUser(user) {
  return !!(user && user.email && user.email.toLowerCase() === SHARED_AUTH_EMAIL.toLowerCase());
}

function looksLikeEmail(s) {
  return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(String(s || "").trim());
}

/** 영업사원 회원가입용. 통과 시 빈 문자열. */
function validateRepSignupPassword(pw) {
  const s = String(pw || "");
  if (s.length < 8) return "비밀번호는 8자 이상이어야 합니다.";
  if (!/[a-z]/.test(s)) return "비밀번호에 영문 소문자를 포함해 주세요.";
  if (!/[A-Z]/.test(s)) return "비밀번호에 영문 대문자를 포함해 주세요.";
  if (!/[0-9]/.test(s)) return "비밀번호에 숫자를 포함해 주세요.";
  if (!/[^a-zA-Z0-9]/.test(s)) return "비밀번호에 특수문자를 포함해 주세요.";
  return "";
}

function mapAuthError(e) {
  const c = e && e.code;
  if (c === "auth/email-already-in-use") return "이미 가입된 이메일입니다.";
  if (c === "auth/invalid-email") return "이메일 형식을 확인해 주세요.";
  if (c === "auth/weak-password") return "비밀번호가 정책에 맞지 않습니다. 8자 이상, 영문 대·소문자, 숫자, 특수문자를 포함해 주세요.";
  if (c === "auth/user-not-found") return "가입된 계정이 없습니다.";
  if (c === "auth/wrong-password" || c === "auth/invalid-credential") return "이메일 또는 비밀번호를 확인해 주세요.";
  if (c === "auth/too-many-requests") return "시도가 너무 많습니다. 잠시 후 다시 시도해 주세요.";
  if (c === "auth/network-request-failed") return "네트워크를 확인해 주세요.";
  if (c === "auth/unauthorized-continue-uri") return "인증 메일 링크 주소가 Firebase에 허용되지 않았습니다. 콘솔 → Authentication → 설정 → 승인된 도메인에 배포 URL을 추가하거나, firebase-config.js 에 window.__NEO_EMAIL_CONTINUE_URL__ = \"http(s)://…/현장_영업사원.html\" 을 넣으세요.";
  return (e && e.message) || String(e);
}

/**
 * 인증·비밀번호 메일의 continue URL (승인된 도메인만 허용).
 * 우선순위: firebase-config.js 지정 → 현재 http(s) 페이지 → 기본 Hosting URL → authDomain 루트.
 */
function neoAuthActionCodeSettings() {
  const cfg = window.__NEO_FIREBASE_CONFIG__ || {};
  const custom = window.__NEO_EMAIL_CONTINUE_URL__;
  if (typeof custom === "string") {
    const t = custom.trim();
    if (t.indexOf("https://") === 0 || t.indexOf("http://") === 0) return { url: t.split("#")[0], handleCodeInApp: false };
  }
  if (typeof window !== "undefined" && window.location && (window.location.protocol === "https:" || window.location.protocol === "http:")) {
    return { url: (window.location.origin + window.location.pathname + window.location.search).split("#")[0], handleCodeInApp: false };
  }
  const pid = cfg.projectId;
  if (typeof pid === "string" && pid && String(pid).indexOf("YOUR_") !== 0) {
    return { url: NEO_PUBLIC_URL_SCHEME + pid + ".web.app/현장_영업사원.html", handleCodeInApp: false };
  }
  const domain = cfg.authDomain;
  if (typeof domain === "string" && domain && String(domain).indexOf("YOUR_") !== 0 && domain.indexOf(".") > 0) {
    return { url: NEO_PUBLIC_URL_SCHEME + domain + "/", handleCodeInApp: false };
  }
  return undefined;
}

async function neoSendUserEmailVerification(user) {
  if (!user || typeof user.sendEmailVerification !== "function") return;
  firebase.auth().languageCode = "ko";
  const acs = neoAuthActionCodeSettings();
  if (acs) await user.sendEmailVerification(acs);
  else await user.sendEmailVerification();
}

function ScreenshotGuard({ children }) {
  useEffect(() => {
    const blockMenu = e => { e.preventDefault(); };
    document.addEventListener("contextmenu", blockMenu);
    const blockKeys = e => {
      if (e.key === "PrintScreen") {
        e.preventDefault();
        e.stopPropagation();
      }
      if (e.metaKey && e.shiftKey && (e.key === "3" || e.key === "4" || e.key === "5")) {
        e.preventDefault();
      }
      if (e.ctrlKey && e.shiftKey && (e.key === "S" || e.key === "s")) {
        e.preventDefault();
      }
    };
    window.addEventListener("keydown", blockKeys, true);
    return () => {
      document.removeEventListener("contextmenu", blockMenu);
      window.removeEventListener("keydown", blockKeys, true);
    };
  }, []);
  return <div className="neo-capture-guard">{children}</div>;
}

function Badge({ children, color }) {
  const colors = {
    green: { bg: "#ECFDF5", text: "#059669", border: "#A7F3D0" },
    yellow: { bg: "#FFF7ED", text: "#D97706", border: "#FED7AA" },
    blue: { bg: "#EFF6FF", text: "#2563EB", border: "#BFDBFE" },
    red: { bg: "#FEF2F2", text: "#DC2626", border: "#FECACA" },
    gray: { bg: "#F3F4F6", text: "#6B7280", border: "#E5E7EB" },
  };
  const c = colors[color] || colors.gray;
  return <span style={{ display: "inline-block", padding: "3px 10px", borderRadius: 20, fontSize: 11, fontWeight: 600, background: c.bg, color: c.text, border: "1px solid " + c.border }}>{children}</span>;
}

function Modal({ open, onClose, title, children }) {
  if (!open) return null;
  return (
    <div className="neo-modal-out" style={{ position: "fixed", inset: 0, zIndex: 1000, background: "rgba(0,0,0,0.45)", display: "flex", alignItems: "flex-end", justifyContent: "center" }} onClick={onClose}>
      <div className="neo-modal-in" onClick={e => e.stopPropagation()} style={{
        background: "#fff", borderRadius: "20px 20px 0 0",
        paddingTop: 24,
        paddingBottom: "max(32px, env(safe-area-inset-bottom, 0px))",
        paddingLeft: "max(20px, env(safe-area-inset-left, 0px))",
        paddingRight: "max(20px, env(safe-area-inset-right, 0px))",
        width: "100%", maxWidth: "100%",
        maxHeight: "min(85vh, 100dvh)", overflowY: "auto", boxShadow: "0 -10px 40px rgba(0,0,0,0.12)",
      }}>
        <div style={{ width: 36, height: 4, borderRadius: 2, background: "#D1D5DB", margin: "0 auto 16px" }} />
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 20 }}>
          <h3 style={{ margin: 0, fontSize: 18, fontWeight: 800, color: "#1A1A2E" }}>{title}</h3>
          <button onClick={onClose} style={{ width: 30, height: 30, borderRadius: 8, border: "none", background: "#F3F4F6", cursor: "pointer", fontSize: 15, color: "#6B7280" }}>✕</button>
        </div>
        {children}
      </div>
    </div>
  );
}

function Input({ label, value, onChange, placeholder, type, multiline }) {
  const style = { width: "100%", padding: "11px 14px", borderRadius: 10, border: "1.5px solid #E5E7EB", fontSize: 16, outline: "none", background: "#FAFAFA", boxSizing: "border-box", resize: "none" };
  return (
    <div style={{ marginBottom: 14 }}>
      <label style={{ display: "block", fontSize: 12, fontWeight: 600, color: "#374151", marginBottom: 5 }}>{label}</label>
      {multiline ? (
        <textarea value={value} onChange={e => onChange(e.target.value)} placeholder={placeholder} rows={3} style={style}
          onFocus={e => e.target.style.borderColor = "#028090"} onBlur={e => e.target.style.borderColor = "#E5E7EB"} />
      ) : (
        <input type={type || "text"} value={value} onChange={e => onChange(e.target.value)} placeholder={placeholder} style={style}
          onFocus={e => e.target.style.borderColor = "#028090"} onBlur={e => e.target.style.borderColor = "#E5E7EB"} />
      )}
    </div>
  );
}

function Select({ label, value, onChange, options }) {
  return (
    <div style={{ marginBottom: 14 }}>
      <label style={{ display: "block", fontSize: 12, fontWeight: 600, color: "#374151", marginBottom: 5 }}>{label}</label>
      <select value={value} onChange={e => onChange(e.target.value)} style={{ width: "100%", padding: "11px 14px", borderRadius: 10, border: "1.5px solid #E5E7EB", fontSize: 16, outline: "none", background: "#FAFAFA", boxSizing: "border-box", cursor: "pointer" }}>
        <option value="">선택</option>
        {options.map(o => <option key={o} value={o}>{o}</option>)}
      </select>
    </div>
  );
}

function Btn({ children, onClick, disabled, color }) {
  const bg = color === "gray" ? "#F3F4F6" : "linear-gradient(135deg, #028090, #00A896)";
  const txt = color === "gray" ? "#374151" : "#fff";
  return (
    <button onClick={onClick} disabled={disabled} style={{
      padding: "12px 24px", borderRadius: 12, border: "none", cursor: disabled ? "not-allowed" : "pointer",
      fontSize: 16, fontWeight: 700, width: "100%", background: disabled ? "#D1D5DB" : bg, color: txt, opacity: disabled ? 0.5 : 1,
    }}>{children}</button>
  );
}

function RepChatMobile({ repId }) {
  const [messages, setMessages] = useState([]);
  const [text, setText] = useState("");
  const [sending, setSending] = useState(false);
  const bottomRef = useRef(null);
  useEffect(() => {
    const db = firebase.firestore();
    const unsub = db.collection("chats").doc(String(repId)).collection("messages")
      .orderBy("createdAt", "asc").limit(200)
      .onSnapshot(snap => setMessages(snap.docs.map(d => ({ id: d.id, ...d.data() }))), err => console.error(err));
    return () => unsub();
  }, [repId]);
  useEffect(() => {
    bottomRef.current && bottomRef.current.scrollIntoView({ behavior: "smooth" });
  }, [messages.length]);
  const send = async () => {
    const t = text.trim();
    if (!t || sending) return;
    setSending(true);
    try {
      await firebase.firestore().collection("chats").doc(String(repId)).collection("messages").add({
        from: "rep",
        text: t,
        createdAt: new Date().toISOString(),
      });
      setText("");
    } catch (e) {
      alert("전송 실패: " + ((e && e.message) || e));
    } finally {
      setSending(false);
    }
  };
  return (
    <div style={{ display: "flex", flexDirection: "column", height: "clamp(280px, calc(100dvh - 240px), 620px)", minHeight: 260, maxHeight: 620 }}>
      <div style={{ flex: 1, overflowY: "auto", padding: "4px 0 12px", display: "flex", flexDirection: "column", gap: 8 }}>
        {messages.length === 0 ? (
          <div style={{ textAlign: "center", color: "#9CA3AF", fontSize: 13, padding: 32 }}>관리자와 대화를 시작해 보세요.</div>
        ) : (
          messages.map(m => {
            const mine = m.from === "rep";
            const body = (!mine && m.from === "admin" && m.kind === "link" && m.url) ? (
              <div style={{ lineHeight: 1.45 }}>
                <div style={{ fontSize: 10, color: "#6B7280", marginBottom: 4 }}>🔗 링크</div>
                <a href={String(m.url).trim()} target="_blank" rel="noopener noreferrer" style={{ color: "#028090", fontWeight: 700, textDecoration: "underline", wordBreak: "break-all" }}>
                  {(m.linkTitle && String(m.linkTitle).trim()) || String(m.url).trim()}
                </a>
                {m.linkTitle ? <div style={{ fontSize: 10, color: "#9CA3AF", marginTop: 6, wordBreak: "break-all" }}>{String(m.url).trim()}</div> : null}
              </div>
            ) : m.text;
            return (
              <div key={m.id} style={{ alignSelf: mine ? "flex-end" : "flex-start", maxWidth: "88%" }}>
                <div style={{ fontSize: 9, color: "#9CA3AF", marginBottom: 2, textAlign: mine ? "right" : "left" }}>{m.from === "admin" ? "관리자" : "나"}</div>
                <div style={{
                  padding: "10px 14px", borderRadius: 14, fontSize: 14, lineHeight: 1.45, whiteSpace: m.kind === "link" && !mine ? "normal" : "pre-wrap", wordBreak: "break-word",
                  background: mine ? "linear-gradient(135deg, #028090, #00A896)" : "#fff",
                  color: mine ? "#fff" : "#374151",
                  border: mine ? "none" : "1px solid #E5E7EB",
                  boxShadow: mine ? "none" : "0 1px 2px rgba(0,0,0,0.04)",
                }}>{body}</div>
              </div>
            );
          })
        )}
        <div ref={bottomRef} />
      </div>
      <div style={{ display: "flex", gap: 8, paddingTop: 10, borderTop: "1px solid #E5E7EB" }}>
        <input value={text} onChange={e => setText(e.target.value)} placeholder="메시지…" style={{ flex: 1, padding: "12px 14px", borderRadius: 12, border: "1.5px solid #E5E7EB", fontSize: 15 }} />
        <button type="button" onClick={send} disabled={sending || !text.trim()} style={{
          padding: "0 18px", borderRadius: 12, border: "none", fontWeight: 700, fontSize: 14,
          background: !text.trim() || sending ? "#D1D5DB" : "#028090", color: "#fff", cursor: !text.trim() || sending ? "not-allowed" : "pointer",
        }}>전송</button>
      </div>
    </div>
  );
}

function EmailVerifyGate({ user, onReload }) {
  const [msg, setMsg] = useState("");
  const [busy, setBusy] = useState(false);
  const sendAgain = async () => {
    setBusy(true);
    setMsg("");
    try {
      await neoSendUserEmailVerification(user);
      setMsg("인증 메일을 다시 보냈습니다. 스팸함도 확인해 주세요.");
    } catch (e) {
      setMsg(mapAuthError(e));
    } finally {
      setBusy(false);
    }
  };
  return (
    <div style={{
      minHeight: "100dvh", background: "#F8FAFB", display: "flex", alignItems: "center", justifyContent: "center",
      padding: "max(20px, env(safe-area-inset-top)) max(20px, env(safe-area-inset-right)) max(20px, env(safe-area-inset-bottom)) max(20px, env(safe-area-inset-left))",
      boxSizing: "border-box",
    }}>
      <div className="neo-app-shell" style={{ width: "100%", maxWidth: "100%", background: "#fff", borderRadius: 20, padding: "26px 22px", boxShadow: "0 4px 24px rgba(0,0,0,0.08)", boxSizing: "border-box" }}>
        <div style={{ fontSize: 18, fontWeight: 800, color: "#1A1A2E", marginBottom: 10 }}>이메일 인증이 필요합니다</div>
        <p style={{ fontSize: 14, color: "#374151", lineHeight: 1.65, marginBottom: 14 }}>
          가입하신 주소(<b>{user.email || ""}</b>)로 <b>한글 인증 메일</b>을 보냈습니다. 메일 속 링크를 눌러 인증을 완료한 뒤 아래 <b>인증 완료, 새로고침</b>을 눌러 주세요.
        </p>
        <p style={{ fontSize: 12, color: "#6B7280", lineHeight: 1.5, marginBottom: 10 }}>
          Firebase 콘솔 → Authentication → 설정 → 사용자 작업 이메일에서 본문을 한글로 바꿀 수 있습니다. 앱에서는 발송 언어를 한국어로 요청합니다.
        </p>
        <p style={{ fontSize: 12, color: "#6B7280", lineHeight: 1.5, marginBottom: 18 }}>메일이 안 오면 스팸함·차단 설정을 확인하고, 잠시 뒤 「인증 메일 다시 보내기」를 눌러 보세요.</p>
        {msg ? <div style={{ fontSize: 13, color: msg.indexOf("다시 보냈") >= 0 ? "#059669" : "#DC2626", marginBottom: 12, lineHeight: 1.5 }}>{msg}</div> : null}
        <button type="button" disabled={busy} onClick={sendAgain} style={{
          width: "100%", padding: 14, borderRadius: 12, border: "none", cursor: busy ? "wait" : "pointer", fontWeight: 700, fontSize: 15,
          background: busy ? "#D1D5DB" : "linear-gradient(135deg, #028090, #00A896)", color: "#fff", marginBottom: 10,
        }}>{busy ? "보내는 중…" : "인증 메일 다시 보내기"}</button>
        <button type="button" onClick={onReload} style={{
          width: "100%", padding: 12, borderRadius: 12, border: "1px solid #028090", cursor: "pointer", fontWeight: 700, fontSize: 14, background: "#fff", color: "#028090", marginBottom: 10,
        }}>인증 완료 — 새로고침</button>
        <button type="button" onClick={() => neoFieldSignOut()} style={{
          width: "100%", padding: 12, borderRadius: 10, border: "1px solid #E5E7EB", cursor: "pointer", background: "#F9FAFB", fontWeight: 600, color: "#374151",
        }}>로그아웃</button>
      </div>
    </div>
  );
}

function RepLoginGate() {
  const [user, setUser] = useState(undefined);
  const [profile, setProfile] = useState(undefined);
  const [authErr, setAuthErr] = useState("");
  const [configError, setConfigError] = useState("");
  const [authMode, setAuthMode] = useState("login");
  const [email, setEmail] = useState(() => neoReadSavedLoginIdField(NEO_FIELD_SAVED_LOGIN_ID_KEY));
  const [password, setPassword] = useState("");
  const [password2, setPassword2] = useState("");
  const [infoMsg, setInfoMsg] = useState("");
  const [emailVerifiedOk, setEmailVerifiedOk] = useState(null);
  const [joinName, setJoinName] = useState("");
  const [joinPhone, setJoinPhone] = useState("");
  const [joinRegion, setJoinRegion] = useState("");
  const [joinSubmitting, setJoinSubmitting] = useState(false);
  const [joinDone, setJoinDone] = useState(false);
  const [joinErr, setJoinErr] = useState("");

  useEffect(() => {
    const cfg = window.__NEO_FIREBASE_CONFIG__;
    if (!cfg || !cfg.apiKey || String(cfg.apiKey).indexOf("YOUR_") === 0) {
      setConfigError("neo 폴더의 firebase-config.js에 Firebase 웹 앱 설정을 넣어주세요.");
      setUser(null);
      return undefined;
    }
    setConfigError("");
    if (!firebase.apps.length) firebase.initializeApp(cfg);
    if (typeof window.neoActivateAppCheckIfConfigured === "function") window.neoActivateAppCheckIfConfigured();
    let unsub = null;
    let cancelled = false;
    (async () => {
      try {
        await firebase.auth().setPersistence(firebase.auth.Auth.Persistence.SESSION);
        const prev = sessionStorage.getItem(NEO_AUTH_SURFACE_KEY);
        if (prev && prev !== NEO_AUTH_SURFACE_FIELD) await firebase.auth().signOut();
        if (!cancelled) sessionStorage.setItem(NEO_AUTH_SURFACE_KEY, NEO_AUTH_SURFACE_FIELD);
      } catch (e) {
        console.warn("[Neo] auth persistence:", e);
      }
      if (cancelled) return;
      firebase.auth().languageCode = "ko";
      unsub = firebase.auth().onAuthStateChanged(setUser);
    })();
    return () => {
      cancelled = true;
      if (unsub) unsub();
    };
  }, []);

  useEffect(() => {
    if (!user) {
      setEmailVerifiedOk(null);
      return undefined;
    }
    if (isSharedNeoRabbitUser(user)) {
      setEmailVerifiedOk(true);
      return undefined;
    }
    let cancelled = false;
    setEmailVerifiedOk(null);
    user.reload().then(() => {
      if (!cancelled) setEmailVerifiedOk(!!user.emailVerified);
    }).catch(() => {
      if (!cancelled) setEmailVerifiedOk(false);
    });
    return () => { cancelled = true; };
  }, [user]);

  useEffect(() => {
    if (!user) {
      setProfile(undefined);
      return undefined;
    }
    if (isSharedNeoRabbitUser(user)) {
      return undefined;
    }
    if (emailVerifiedOk !== true) {
      setProfile(undefined);
      return undefined;
    }
    setProfile(undefined);
    const db = firebase.firestore();
    const unsub = db.collection("profiles").doc(user.uid).onSnapshot(
      snap => setProfile(snap.exists ? snap.data() : null),
      err => {
        console.error(err);
        setProfile(null);
      }
    );
    return () => unsub();
  }, [user, emailVerifiedOk]);

  useEffect(() => {
    if (!user) return undefined;
    const tick = () => {
      if (neoAuthSessionExpiredField(NEO_FIELD_AUTH_SESSION_START_KEY)) neoFieldSignOut();
    };
    if (neoAuthSessionExpiredField(NEO_FIELD_AUTH_SESSION_START_KEY)) {
      neoFieldSignOut();
      return undefined;
    }
    if (!neoGetAuthSessionStartedField(NEO_FIELD_AUTH_SESSION_START_KEY)) neoSetAuthSessionStartedField(NEO_FIELD_AUTH_SESSION_START_KEY);
    const id = setInterval(tick, 60 * 1000);
    if (typeof window !== "undefined") window.addEventListener("focus", tick);
    return () => {
      clearInterval(id);
      if (typeof window !== "undefined") window.removeEventListener("focus", tick);
    };
  }, [user]);

  const doLogin = async e => {
    e.preventDefault();
    setAuthErr("");
    setInfoMsg("");
    try {
      await firebase.auth().signInWithEmailAndPassword(loginIdToAuthEmail(email), password);
      neoSaveSavedLoginIdField(NEO_FIELD_SAVED_LOGIN_ID_KEY, email);
      neoSetAuthSessionStartedField(NEO_FIELD_AUTH_SESSION_START_KEY);
    } catch (err) {
      setAuthErr(mapAuthError(err));
    }
  };

  const doSignup = async e => {
    e.preventDefault();
    setAuthErr("");
    setInfoMsg("");
    const raw = email.trim();
    if (!looksLikeEmail(raw)) {
      setAuthErr("영업사원 회원가입은 이메일 주소만 사용할 수 있습니다. (예: hong@example.com)");
      return;
    }
    const authEmail = raw.toLowerCase();
    if (authEmail === SHARED_AUTH_EMAIL.toLowerCase()) {
      setAuthErr("관리자용 " + SHARED_LOGIN_ID + " 는 회원가입이 아니라 로그인에서만 사용하세요.");
      return;
    }
    const pwErr = validateRepSignupPassword(password);
    if (pwErr) {
      setAuthErr(pwErr);
      return;
    }
    if (password !== password2) {
      setAuthErr("비밀번호가 서로 일치하지 않습니다.");
      return;
    }
    try {
      firebase.auth().languageCode = "ko";
      const cred = await firebase.auth().createUserWithEmailAndPassword(authEmail, password);
      neoSaveSavedLoginIdField(NEO_FIELD_SAVED_LOGIN_ID_KEY, raw);
      neoSetAuthSessionStartedField(NEO_FIELD_AUTH_SESSION_START_KEY);
      await neoSendUserEmailVerification(cred.user);
      setInfoMsg("입력하신 메일로 인증 링크를 보냈습니다. 메일을 연 뒤 본문의 링크를 눌러 인증을 마친 다음, 아래 「인증 완료」를 누르거나 로그아웃 후 다시 로그인하세요. 메일 제목·본문 한글은 Firebase 콘솔 → Authentication → 템플릿에서 수정할 수 있습니다.");
      setPassword("");
      setPassword2("");
    } catch (err) {
      setAuthErr(mapAuthError(err));
    }
  };

  const doResetPassword = async e => {
    e.preventDefault();
    setAuthErr("");
    setInfoMsg("");
    const em = loginIdToAuthEmail(email).trim();
    if (!em) {
      setAuthErr("아이디 또는 이메일을 입력해 주세요.");
      return;
    }
    try {
      const acs = neoAuthActionCodeSettings();
      if (acs) await firebase.auth().sendPasswordResetEmail(em, acs);
      else await firebase.auth().sendPasswordResetEmail(em);
      setInfoMsg("비밀번호 재설정 링크를 메일로 보냈습니다. 받은편지함(스팸함 포함)을 확인해 주세요.");
    } catch (err) {
      setAuthErr(mapAuthError(err));
    }
  };

  const inStyle = { width: "100%", padding: "12px 14px", borderRadius: 10, border: "1.5px solid #E5E7EB", fontSize: 16, boxSizing: "border-box", background: "#FAFAFA" };
  const lb = { display: "block", fontSize: 12, fontWeight: 600, color: "#374151", marginBottom: 6 };
  const linkBtn = { background: "none", border: "none", cursor: "pointer", color: "#028090", fontSize: 13, fontWeight: 600, textDecoration: "underline", padding: 0 };

  if (configError) {
    return (
      <div style={{
        minHeight: "100dvh", background: "#F8FAFB", display: "flex", alignItems: "center", justifyContent: "center",
        paddingTop: "max(20px, env(safe-area-inset-top, 0px))",
        paddingBottom: "max(20px, env(safe-area-inset-bottom, 0px))",
        paddingLeft: "max(20px, env(safe-area-inset-left, 0px))",
        paddingRight: "max(20px, env(safe-area-inset-right, 0px))",
        boxSizing: "border-box",
      }}>
        <div style={{ color: "#DC2626", textAlign: "center", maxWidth: "100%", lineHeight: 1.6, fontSize: 14 }}>{configError}</div>
      </div>
    );
  }
  if (user === undefined) {
    return (
      <div style={{ minHeight: "100dvh", background: "#F8FAFB", display: "flex", alignItems: "center", justifyContent: "center" }}>
        <div style={{ fontSize: 14, color: "#6B7280" }}>로그인 확인 중…</div>
      </div>
    );
  }
  if (!user) {
    return (
      <div style={{
        minHeight: "100dvh", background: "#F8FAFB", display: "flex", alignItems: "center", justifyContent: "center",
        paddingTop: "max(16px, env(safe-area-inset-top, 0px))",
        paddingBottom: "max(16px, env(safe-area-inset-bottom, 0px))",
        paddingLeft: "max(16px, env(safe-area-inset-left, 0px))",
        paddingRight: "max(16px, env(safe-area-inset-right, 0px))",
        boxSizing: "border-box",
      }}>
        <div className="neo-app-shell" style={{ width: "100%", maxWidth: "100%", background: "#fff", borderRadius: 20, padding: "28px 22px", boxShadow: "0 4px 24px rgba(0,0,0,0.08)", margin: "0 auto", boxSizing: "border-box" }}>
          <div style={{ fontSize: 22, fontWeight: 800, color: "#1A1A2E", marginBottom: 4 }}>네오래빗</div>
          <div style={{ fontSize: 12, color: "#028090", fontWeight: 700, marginBottom: 10 }}>영업사원 어드민</div>
          {(authMode === "signup" || authMode === "forgotId" || authMode === "forgotPw") ? (
            <p style={{ fontSize: 13, color: "#6B7280", marginBottom: 18, lineHeight: 1.5 }}>
              {authMode === "signup" && "영업사원은 이메일로만 가입합니다. 인증 메일의 링크를 누른 뒤 이 앱에서 로그인하세요. 이후 관리자 승인 또는 프로필 등록이 필요합니다."}
              {authMode === "forgotId" && "로그인 아이디 안내"}
              {authMode === "forgotPw" && "가입 시 사용한 이메일로 재설정 링크를 보냅니다."}
            </p>
          ) : null}

          {authMode === "forgotId" && (
            <div style={{ marginBottom: 16 }}>
              <p style={{ fontSize: 14, color: "#374151", lineHeight: 1.7 }}>공용 아이디는 <b>{SHARED_LOGIN_ID}</b> 입니다. 그 외는 가입 시 <b>이메일</b>이 아이디입니다.</p>
              <button type="button" style={{ ...linkBtn, marginTop: 14 }} onClick={() => { setAuthMode("login"); setAuthErr(""); setInfoMsg(""); }}>로그인으로 돌아가기</button>
            </div>
          )}

          {(authMode === "login" || authMode === "signup" || authMode === "forgotPw") && (
            <form onSubmit={authMode === "login" ? doLogin : authMode === "signup" ? doSignup : doResetPassword}>
              <div style={{ marginBottom: 12 }}>
                <label style={lb}>{authMode === "signup" ? "이메일 (회원가입)" : "이메일"}</label>
                <input type={authMode === "signup" || authMode === "forgotPw" ? "email" : "text"} autoComplete="username" value={email} onChange={e => setEmail(e.target.value)} style={inStyle} placeholder={authMode === "signup" ? "예: hong@company.com" : authMode === "forgotPw" ? "가입 시 사용한 이메일" : "이메일을 입력하세요"} required />
              </div>
              {authMode === "signup" ? (
                <p style={{ fontSize: 11, color: "#6B7280", marginBottom: 10, lineHeight: 1.45 }}>
                  비밀번호는 <b>8자 이상</b>, <b>영문 대문자·소문자·숫자·특수문자</b>를 각각 포함해야 합니다.
                </p>
              ) : null}
              {authMode !== "forgotPw" && (
                <div style={{ marginBottom: 12 }}>
                  <label style={lb}>비밀번호</label>
                  <input type="password" autoComplete={authMode === "signup" ? "new-password" : "current-password"} value={password} onChange={e => setPassword(e.target.value)} style={inStyle} placeholder={authMode === "signup" ? "예: Abcdef1!" : "비밀번호"} required />
                </div>
              )}
              {authMode === "signup" && (
                <div style={{ marginBottom: 16 }}>
                  <label style={lb}>비밀번호 확인</label>
                  <input type="password" autoComplete="new-password" value={password2} onChange={e => setPassword2(e.target.value)} style={inStyle} placeholder="다시 입력" required />
                </div>
              )}
              {authErr ? <div style={{ color: "#DC2626", fontSize: 12, marginBottom: 10 }}>{authErr}</div> : null}
              {infoMsg ? <div style={{ color: "#059669", fontSize: 12, marginBottom: 10, lineHeight: 1.5 }}>{infoMsg}</div> : null}
              {authMode === "login" ? (
                <p style={{ fontSize: 11, color: "#9CA3AF", lineHeight: 1.45, marginBottom: 10 }}>이메일(아이디)는 이 브라우저에만 저장됩니다. 로그인 후 <b>24시간</b>이 지나면 자동으로 로그아웃됩니다.</p>
              ) : null}
              <button type="submit" style={{ width: "100%", padding: "14px", borderRadius: 12, border: "none", cursor: "pointer", fontWeight: 700, fontSize: 16, background: "linear-gradient(135deg, #028090, #00A896)", color: "#fff", marginBottom: 12 }}>
                {authMode === "login" ? "로그인" : authMode === "signup" ? "회원가입" : "재설정 메일 보내기"}
              </button>
            </form>
          )}

          {authMode === "login" && (
            <div style={{ display: "flex", flexWrap: "wrap", gap: "10px 14px", justifyContent: "center" }}>
              <button type="button" style={linkBtn} onClick={() => { setAuthMode("signup"); setAuthErr(""); setInfoMsg(""); }}>회원가입</button>
              <button type="button" style={linkBtn} onClick={() => { setAuthMode("forgotId"); setAuthErr(""); setInfoMsg(""); }}>아이디 찾기</button>
              <button type="button" style={linkBtn} onClick={() => { setAuthMode("forgotPw"); setAuthErr(""); setInfoMsg(""); }}>비밀번호 찾기</button>
            </div>
          )}
          {authMode === "signup" && (
            <button type="button" style={{ ...linkBtn, display: "block", margin: "0 auto" }} onClick={() => { setAuthMode("login"); setAuthErr(""); setInfoMsg(""); }}>이미 계정이 있어요</button>
          )}
          {authMode === "forgotPw" && (
            <button type="button" style={{ ...linkBtn, display: "block", margin: "10px auto 0" }} onClick={() => { setAuthMode("login"); setAuthErr(""); setInfoMsg(""); }}>로그인으로 돌아가기</button>
          )}
        </div>
      </div>
    );
  }
  if (user && !isSharedNeoRabbitUser(user) && emailVerifiedOk === null) {
    return (
      <div style={{ minHeight: "100dvh", background: "#F8FAFB", display: "flex", alignItems: "center", justifyContent: "center" }}>
        <div style={{ fontSize: 14, color: "#6B7280" }}>계정 확인 중…</div>
      </div>
    );
  }
  if (user && !isSharedNeoRabbitUser(user) && emailVerifiedOk === false) {
    return (
      <EmailVerifyGate
        user={user}
        onReload={async () => {
          await user.reload();
          setEmailVerifiedOk(!!user.emailVerified);
        }}
      />
    );
  }
  if (isSharedNeoRabbitUser(user)) {
    return (
      <ScreenshotGuard>
        <App repId={SHARED_DEFAULT_REP_ID} onSignOut={() => neoFieldSignOut()} />
      </ScreenshotGuard>
    );
  }
  if (profile === undefined) {
    return (
      <div style={{ minHeight: "100dvh", background: "#F8FAFB", display: "flex", alignItems: "center", justifyContent: "center", padding: 24, boxSizing: "border-box" }}>
        <div style={{ fontSize: 14, color: "#6B7280" }}>프로필 확인 중…</div>
      </div>
    );
  }
  if (profile === null || profile.role !== "rep" || profile.repId == null || String(profile.repId).trim() === "") {
    const submitJoin = async () => {
      setJoinErr("");
      if (!joinName.trim() || !joinPhone.trim() || !joinRegion.trim()) {
        setJoinErr("이름·연락처·활동 지역을 모두 입력해 주세요.");
        return;
      }
      setJoinSubmitting(true);
      try {
        const db = firebase.firestore();
        await db.collection("rep_join_requests").doc(user.uid).set({
          name: joinName.trim(),
          phone: joinPhone.trim(),
          region: joinRegion.trim(),
          email: (user.email || "").trim(),
          createdAt: new Date().toISOString(),
          status: "pending",
        }, { merge: true });
        setJoinDone(true);
      } catch (e) {
        setJoinErr((e && e.message) || String(e));
      } finally {
        setJoinSubmitting(false);
      }
    };
    return (
      <div className="neo-app-shell" style={{
        minHeight: "100dvh", background: "#F8FAFB", width: "100%", maxWidth: "100%", margin: 0, boxSizing: "border-box",
        paddingTop: "max(24px, env(safe-area-inset-top, 0px))",
        paddingBottom: "max(24px, env(safe-area-inset-bottom, 0px))",
        paddingLeft: "max(20px, env(safe-area-inset-left, 0px))",
        paddingRight: "max(20px, env(safe-area-inset-right, 0px))",
      }}>
        <div style={{ fontSize: 17, fontWeight: 800, color: "#1A1A2E", marginBottom: 12 }}>등록이 필요합니다</div>
        <p style={{ fontSize: 13, color: "#6B7280", lineHeight: 1.6, marginBottom: 12 }}>아래에서 <b>가입 요청</b>을 내면 관리자 화면에 동일하게 표시되며, 승인 후 앱이 바로 열립니다. (기존 방식으로 관리자가 직접 profiles를 넣어도 됩니다.)</p>
        <div style={{ background: "#fff", borderRadius: 12, padding: 14, marginBottom: 14, border: "1px solid #E5E7EB", wordBreak: "break-all", fontFamily: "ui-monospace, monospace", fontSize: 11, color: "#6B7280" }}>사용자 ID (UID)<br /><span style={{ color: "#1A1A2E", fontSize: 12 }}>{user.uid}</span></div>

        {joinDone ? (
          <div style={{ background: "#ECFDF5", borderRadius: 12, padding: 16, marginBottom: 14, border: "1px solid #A7F3D0", fontSize: 14, color: "#065F46", lineHeight: 1.6 }}>
            요청이 접수되었습니다. 관리자 승인 후 이 화면이 자동으로 넘어갑니다. 잠시 후 아래를 눌러 새로고침 해 보세요.
          </div>
        ) : (
          <div style={{ background: "#fff", borderRadius: 14, padding: 16, marginBottom: 14, border: "1px solid #E5E7EB", boxShadow: "0 1px 4px rgba(0,0,0,0.05)" }}>
            <div style={{ fontSize: 14, fontWeight: 700, color: "#1A1A2E", marginBottom: 12 }}>가입 요청 보내기</div>
            <Input label="이름" value={joinName} onChange={setJoinName} placeholder="실명" />
            <Input label="연락처" value={joinPhone} onChange={setJoinPhone} placeholder="010-0000-0000" type="tel" />
            <Input label="활동 지역" value={joinRegion} onChange={setJoinRegion} placeholder="예: 용인, 동탄" />
            {joinErr ? <div style={{ color: "#DC2626", fontSize: 12, marginBottom: 10 }}>{joinErr}</div> : null}
            <Btn onClick={submitJoin} disabled={joinSubmitting}>{joinSubmitting ? "전송 중…" : "요청 보내기"}</Btn>
          </div>
        )}

        <p style={{ fontSize: 11, color: "#9CA3AF", lineHeight: 1.5, marginBottom: 12 }}>수동 등록: Firestore <b>profiles</b> 문서 ID = 위 UID, 필드 <b>role</b> rep, <b>repId</b> = 관리자 「담당 ID」</p>
        <button type="button" onClick={() => neoFieldSignOut()} style={{ width: "100%", padding: 12, borderRadius: 10, border: "1px solid #E5E7EB", cursor: "pointer", background: "#fff", fontWeight: 600 }}>로그아웃</button>
      </div>
    );
  }
  return (
    <ScreenshotGuard>
      <App repId={String(profile.repId)} onSignOut={() => neoFieldSignOut()} />
    </ScreenshotGuard>
  );
}

function App({ repId, onSignOut }) {
  const [tab, setTab] = useState("home");
  const tabRef = useRef(tab);
  useEffect(() => { tabRef.current = tab; }, [tab]);
  const [adminChatUnread, setAdminChatUnread] = useState(0);
  const [notifNudgeDismissed, setNotifNudgeDismissed] = useState(() => {
    try {
      if (typeof Notification === "undefined") return true;
      if (Notification.permission === "granted") return true;
      return sessionStorage.getItem("neo_rep_notif_nudge") === "1";
    } catch (e) {
      return true;
    }
  });
  const [stores, setStores] = useState([]);
  const [visits, setVisits] = useState([]);
  const [loadState, setLoadState] = useState({ loading: true, error: "" });
  const [showAddStore, setShowAddStore] = useState(false);
  const [showAddVisit, setShowAddVisit] = useState(false);
  const [showDetail, setShowDetail] = useState(null);
  const [storeFilter, setStoreFilter] = useState("all");

  const [newStore, setNewStore] = useState({ name: "", type: "", address: "", note: "" });
  const [newVisit, setNewVisit] = useState({ name: "", address: "", result: "", note: "", date: "" });
  const [visitFormMode, setVisitFormMode] = useState("add");
  const [editingVisitId, setEditingVisitId] = useState(null);
  const [storeSelectionMode, setStoreSelectionMode] = useState(false);
  const [selectedStoreIds, setSelectedStoreIds] = useState([]);
  const [announceDoc, setAnnounceDoc] = useState(null);
  const [showAnnouncePopup, setShowAnnouncePopup] = useState(false);
  const [showAnnounceRead, setShowAnnounceRead] = useState(false);
  const [headerNow, setHeaderNow] = useState(() => new Date());

  useEffect(() => {
    const id = setInterval(() => setHeaderNow(new Date()), 30000);
    return () => clearInterval(id);
  }, []);

  /** 관리자가 채팅을내면 브라우저 알림(허용된 경우). 메시지 탭을 보고 있을 때는 알림 생략(카카오톡과 유사). */
  useEffect(() => {
    if (!repId) return undefined;
    const db = firebase.firestore();
    const latestIdRef = { current: null };
    const lastNotifiedIdRef = { current: null };
    const q = db.collection("chats").doc(String(repId)).collection("messages").orderBy("createdAt", "desc").limit(1);
    const maybeNotify = (d, id) => {
      if (!d || d.from !== "admin" || !id) return;
      if (tabRef.current === "chat") return;
      if (lastNotifiedIdRef.current === id) return;
      lastNotifiedIdRef.current = id;
      sendNeoRepAdminChatNotification(d, id);
    };
    const unsub = q.onSnapshot(snap => {
      if (!snap || snap.empty) {
        if (latestIdRef.current === null) latestIdRef.current = "__empty__";
        return;
      }
      const doc = snap.docs[0];
      const id = doc.id;
      const d = doc.data() || {};
      const prev = latestIdRef.current;
      latestIdRef.current = id;
      if (prev === null) return;
      if (prev === "__empty__") {
        maybeNotify(d, id);
        return;
      }
      if (prev === id) return;
      maybeNotify(d, id);
    }, err => console.error(err));
    return () => unsub();
  }, [repId]);

  /** 메시지 탭 미읽음: 관리자 메시지 기준. 탭을 열면 읽음 처리되어 숫자 배지가 사라짐. */
  useEffect(() => {
    if (!repId) return undefined;
    const db = firebase.firestore();
    const q = db.collection("chats").doc(String(repId)).collection("messages").orderBy("createdAt", "desc").limit(80);
    const unsub = q.onSnapshot(snap => {
      const docs = snap.docs.map(d => ({ id: d.id, ...(d.data() || {}) }));
      const lr = getNeoRepChatLastRead(repId);
      if (!lr || !lr.at) {
        if (docs.length === 0) {
          setAdminChatUnread(0);
          return;
        }
        const newest = docs[0];
        if (newest.createdAt) setNeoRepChatLastRead(repId, newest.createdAt, newest.id);
        setAdminChatUnread(0);
        return;
      }
      if (tabRef.current === "chat") {
        setAdminChatUnread(0);
        return;
      }
      const unread = docs.filter(m => m.from === "admin" && String(m.createdAt || "") > lr.at).length;
      setAdminChatUnread(unread);
    }, err => console.error(err));
    return () => unsub();
  }, [repId, tab]);

  /** 메시지 탭을 볼 때마다 최신 메시지 시각으로 읽음 갱신 */
  useEffect(() => {
    if (!repId || tab !== "chat") return undefined;
    const db = firebase.firestore();
    const q = db.collection("chats").doc(String(repId)).collection("messages").orderBy("createdAt", "desc").limit(1);
    const unsub = q.onSnapshot(snap => {
      if (!snap || snap.empty) return;
      const doc = snap.docs[0];
      const d = doc.data() || {};
      if (d.createdAt) setNeoRepChatLastRead(repId, d.createdAt, doc.id);
    }, err => console.error(err));
    return () => unsub();
  }, [repId, tab]);

  useEffect(() => {
    const cfg = window.__NEO_FIREBASE_CONFIG__;
    if (!cfg || !cfg.apiKey || String(cfg.apiKey).indexOf("YOUR_") === 0) {
      setLoadState({ loading: false, error: "neo 폴더의 firebase-config.js에 Firebase 웹 앱 설정을 넣어주세요." });
      return;
    }
    let unsubStores, unsubVisits, unsubAnnounce;
    (async () => {
      try {
        if (!firebase.apps.length) firebase.initializeApp(cfg);
        if (typeof window.neoActivateAppCheckIfConfigured === "function") window.neoActivateAppCheckIfConfigured();
        const db = firebase.firestore();
        unsubStores = db.collection("stores").where("repId", "==", repId).onSnapshot(snap => {
          setStores(snap.docs.map(d => {
            const x = d.data();
            return {
              id: d.id,
              name: x.name,
              type: x.type,
              address: x.address || "",
              date: x.date,
              note: x.note || "",
              status: x.activated ? "activated" : "pending",
            };
          }));
        }, err => console.error(err));
        unsubVisits = db.collection("visits").where("repId", "==", repId).onSnapshot(snap => {
          const rows = snap.docs.map(d => ({ id: d.id, ...d.data() }));
          rows.sort((a, b) => (b.date || "").localeCompare(a.date || ""));
          setVisits(rows);
        }, err => console.error(err));
        unsubAnnounce = db.collection("settings").doc("rep_announcement").onSnapshot(snap => {
          const d = snap.exists ? snap.data() : null;
          setAnnounceDoc(d || null);
          if (!d || d.title == null || d.title === "") {
            setShowAnnouncePopup(false);
            return;
          }
          const ver = announceVersionFromDoc(d);
          let seen = 0;
          try { seen = parseInt(localStorage.getItem("neo_rep_ann_v") || "0", 10) || 0; } catch (e) { seen = 0; }
          if (ver > seen) setShowAnnouncePopup(true);
        }, err => console.error(err));
        setLoadState({ loading: false, error: "" });
      } catch (e) {
        console.error(e);
        setLoadState({ loading: false, error: (e && e.message) || String(e) });
      }
    })();
    return () => {
      if (unsubStores) unsubStores();
      if (unsubVisits) unsubVisits();
      if (unsubAnnounce) unsubAnnounce();
    };
  }, [repId]);

  const dismissAnnouncePopup = () => {
    const ver = announceVersionFromDoc(announceDoc);
    if (ver > 0) {
      try { localStorage.setItem("neo_rep_ann_v", String(ver)); } catch (e) { /* ignore */ }
    }
    setShowAnnouncePopup(false);
  };

  useEffect(() => {
    setShowDetail(prev => {
      if (!prev) return prev;
      const next = stores.find(s => String(s.id) === String(prev.id));
      return next != null ? next : null;
    });
  }, [stores]);

  useEffect(() => {
    if (!storeSelectionMode) setSelectedStoreIds([]);
  }, [storeSelectionMode]);

  const activated = stores.filter(s => s.status === "activated").length;
  const pending = stores.filter(s => s.status === "pending").length;
  const totalIncentive = stores.length * 20000 + activated * 10000;
  const todayVisits = visits.filter(v => v.date === new Date().toISOString().slice(0, 10)).length;

  const filteredStores = storeFilter === "all" ? stores : stores.filter(s => s.status === storeFilter);

  const handleAddStore = async () => {
    if (!newStore.name || !newStore.type) return;
    try {
      const db = firebase.firestore();
      await db.collection("stores").add({
        repId,
        name: newStore.name,
        type: newStore.type,
        address: newStore.address || "",
        note: newStore.note || "",
        date: new Date().toISOString().slice(0, 10),
        activated: false,
      });
      setNewStore({ name: "", type: "", address: "", note: "" });
      setShowAddStore(false);
    } catch (e) {
      alert("저장 실패: " + ((e && e.message) || e));
    }
  };

  const visitDateOrToday = () => {
    const d = (newVisit.date || "").trim();
    if (/^\d{4}-\d{2}-\d{2}$/.test(d)) return d;
    return new Date().toISOString().slice(0, 10);
  };

  const openAddVisitModal = () => {
    setVisitFormMode("add");
    setEditingVisitId(null);
    setNewVisit({ name: "", address: "", result: "", note: "", date: new Date().toISOString().slice(0, 10) });
    setShowAddVisit(true);
  };

  const openEditVisitModal = v => {
    setVisitFormMode("edit");
    setEditingVisitId(v.id);
    setNewVisit({
      name: v.name || "",
      address: v.address || "",
      result: v.result || "",
      note: v.note || "",
      date: (v.date && String(v.date).slice(0, 10)) || new Date().toISOString().slice(0, 10),
    });
    setShowAddVisit(true);
  };

  const handleSaveVisit = async () => {
    if (!newVisit.name || !newVisit.result) return;
    const dateStr = visitDateOrToday();
    try {
      const db = firebase.firestore();
      if (visitFormMode === "edit" && editingVisitId) {
        await db.collection("visits").doc(String(editingVisitId)).update({
          name: newVisit.name,
          address: newVisit.address || "",
          date: dateStr,
          result: newVisit.result,
          note: newVisit.note || "",
        });
      } else {
        await db.collection("visits").add({
          repId,
          name: newVisit.name,
          address: newVisit.address || "",
          date: dateStr,
          result: newVisit.result,
          note: newVisit.note || "",
        });
      }
      setNewVisit({ name: "", address: "", result: "", note: "", date: "" });
      setEditingVisitId(null);
      setVisitFormMode("add");
      setShowAddVisit(false);
    } catch (e) {
      alert("저장 실패: " + ((e && e.message) || e));
    }
  };

  const handleDeleteVisit = async v => {
    if (!window.confirm("이 방문 기록을 삭제할까요?")) return;
    try {
      await firebase.firestore().collection("visits").doc(String(v.id)).delete();
    } catch (e) {
      alert("삭제 실패: " + ((e && e.message) || e));
    }
  };

  const toggleStoreSelected = id => {
    const sid = String(id);
    setSelectedStoreIds(prev => (prev.indexOf(sid) >= 0 ? prev.filter(x => x !== sid) : prev.concat(sid)));
  };

  const selectAllFilteredStores = () => {
    setSelectedStoreIds(filteredStores.map(s => String(s.id)));
  };

  const bulkSetStoresActivated = async activated => {
    if (selectedStoreIds.length === 0) return;
    if (!window.confirm("선택한 " + selectedStoreIds.length + "곳을 " + (activated ? "활성화" : "미활성화") + "할까요?")) return;
    try {
      const db = firebase.firestore();
      await Promise.all(selectedStoreIds.map(id => db.collection("stores").doc(id).update({ activated })));
      setSelectedStoreIds([]);
      setStoreSelectionMode(false);
    } catch (e) {
      alert("처리 실패: " + ((e && e.message) || e));
    }
  };

  const bulkDeleteStores = async () => {
    if (selectedStoreIds.length === 0) return;
    if (!window.confirm("선택한 " + selectedStoreIds.length + "곳을 영구 삭제할까요? 되돌릴 수 없습니다.")) return;
    try {
      const db = firebase.firestore();
      await Promise.all(selectedStoreIds.map(id => db.collection("stores").doc(id).delete()));
      setShowDetail(d => (d && selectedStoreIds.indexOf(String(d.id)) >= 0 ? null : d));
      setSelectedStoreIds([]);
      setStoreSelectionMode(false);
    } catch (e) {
      alert("삭제 실패: " + ((e && e.message) || e));
    }
  };

  const handleDeleteStore = async id => {
    if (!window.confirm("이 업체를 삭제할까요? 되돌릴 수 없습니다.")) return;
    try {
      await firebase.firestore().collection("stores").doc(String(id)).delete();
      setShowDetail(d => (d && String(d.id) === String(id) ? null : d));
    } catch (e) {
      alert("삭제 실패: " + ((e && e.message) || e));
    }
  };

  const handleToggleStatus = async (id) => {
    const s = stores.find(x => String(x.id) === String(id));
    if (!s) return;
    const nextActivated = s.status !== "activated";
    try {
      const db = firebase.firestore();
      await db.collection("stores").doc(String(id)).update({ activated: nextActivated });
    } catch (e) {
      alert("상태 변경 실패: " + ((e && e.message) || e));
    }
  };

  if (loadState.loading) {
    return (
      <div style={{ minHeight: "100dvh", background: "#F8FAFB", display: "flex", alignItems: "center", justifyContent: "center" }}>
        <div style={{ fontSize: 14, color: "#6B7280" }}>연결 중…</div>
      </div>
    );
  }
  if (loadState.error) {
    return (
      <div style={{
        minHeight: "100dvh", background: "#F8FAFB", display: "flex", alignItems: "center", justifyContent: "center",
        paddingTop: "max(20px, env(safe-area-inset-top, 0px))",
        paddingBottom: "max(20px, env(safe-area-inset-bottom, 0px))",
        paddingLeft: "max(20px, env(safe-area-inset-left, 0px))",
        paddingRight: "max(20px, env(safe-area-inset-right, 0px))",
        boxSizing: "border-box",
      }}>
        <div style={{ color: "#DC2626", textAlign: "center", maxWidth: "100%", lineHeight: 1.6, fontSize: 14 }}>{loadState.error}</div>
      </div>
    );
  }

  const tabs = [
    { id: "home", icon: "🏠", label: "홈" },
    { id: "stores", icon: "🏪", label: "내 업체" },
    { id: "visits", icon: "📋", label: "방문 기록" },
    { id: "chat", icon: "💬", label: "메시지" },
    { id: "guide", icon: "📖", label: "가이드" },
  ];

  return (
    <div className="neo-app-shell" style={{
      minHeight: "100dvh",
      width: "100%",
      maxWidth: "100%",
      paddingBottom: "calc(70px + max(0px, env(safe-area-inset-bottom, 0px)))",
      background: "#F8FAFB",
      boxSizing: "border-box",
    }}>

      {showAnnouncePopup && announceDoc && announceDoc.title && (
        <div style={{
          position: "fixed", inset: 0, zIndex: 2000, background: "rgba(0,0,0,0.5)", display: "flex", alignItems: "center", justifyContent: "center",
          padding: "max(16px, env(safe-area-inset-top, 0px)) max(16px, env(safe-area-inset-right, 0px)) max(16px, env(safe-area-inset-bottom, 0px)) max(16px, env(safe-area-inset-left, 0px))",
          boxSizing: "border-box",
        }}>
          <div style={{ background: "#fff", borderRadius: 18, padding: 22, maxWidth: 400, width: "100%", boxShadow: "0 20px 50px rgba(0,0,0,0.2)" }}>
            <div style={{ fontSize: 11, fontWeight: 700, color: "#028090", marginBottom: 8 }}>공지사항</div>
            <div style={{ fontSize: 18, fontWeight: 800, color: "#1A1A2E", marginBottom: 12 }}>{announceDoc.title}</div>
            <div style={{ fontSize: 14, color: "#374151", lineHeight: 1.65, whiteSpace: "pre-wrap", maxHeight: "min(50vh, 320px)", overflowY: "auto", marginBottom: 18 }}>{announceDoc.body || ""}</div>
            <Btn onClick={dismissAnnouncePopup}>확인했습니다</Btn>
          </div>
        </div>
      )}

      <Modal open={showAnnounceRead} onClose={() => setShowAnnounceRead(false)} title="공지사항">
        {announceDoc && announceDoc.title ? (
          <React.Fragment>
            <div style={{ fontSize: 16, fontWeight: 800, color: "#1A1A2E", marginBottom: 10 }}>{announceDoc.title}</div>
            <div style={{ fontSize: 14, color: "#374151", lineHeight: 1.65, whiteSpace: "pre-wrap", marginBottom: 16 }}>{announceDoc.body || ""}</div>
            <Btn color="gray" onClick={() => setShowAnnounceRead(false)}>닫기</Btn>
          </React.Fragment>
        ) : (
          <div style={{ fontSize: 14, color: "#9CA3AF" }}>등록된 공지가 없습니다.</div>
        )}
      </Modal>

      {/* Header */}
      <div style={{
        background: "linear-gradient(135deg, #028090, #00A896)",
        paddingTop: "max(16px, env(safe-area-inset-top, 0px))",
        paddingBottom: 16,
        paddingLeft: "max(20px, env(safe-area-inset-left, 0px))",
        paddingRight: "max(20px, env(safe-area-inset-right, 0px))",
        display: "flex", alignItems: "center", justifyContent: "space-between", gap: 8, flexWrap: "wrap",
      }}>
        <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
          <span style={{ fontSize: 20 }}>🐰</span>
          <div>
            <div style={{ color: "#fff", fontSize: 15, fontWeight: 800 }}>네오래빗</div>
            <div style={{ color: "rgba(255,255,255,0.6)", fontSize: 10 }}>영업사원 어드민</div>
          </div>
        </div>
        <div style={{ display: "flex", alignItems: "center", gap: 8, flexWrap: "wrap", justifyContent: "flex-end" }}>
          <div style={{ color: "rgba(255,255,255,0.85)", fontSize: 10, fontWeight: 600 }}>담당 {repId}</div>
          {announceDoc && announceDoc.title && (
            <button type="button" onClick={() => setShowAnnounceRead(true)} style={{
              padding: "6px 10px", borderRadius: 8, border: "1px solid rgba(255,255,255,0.45)", background: "rgba(255,255,255,0.15)",
              color: "#fff", fontSize: 11, fontWeight: 700, cursor: "pointer",
            }}>공지</button>
          )}
          <button type="button" onClick={onSignOut} style={{
            padding: "6px 10px", borderRadius: 8, border: "1px solid rgba(255,255,255,0.35)", background: "rgba(0,0,0,0.1)",
            color: "#fff", fontSize: 11, fontWeight: 700, cursor: "pointer",
          }}>나가기</button>

      {tab === "guide" && (
        <div style={NEO_SECTION_PAD}>
          <div style={{ fontSize: 18, fontWeight: 800, color: "#1A1A2E", marginBottom: 16 }}>영업 가이드</div>

          {[
            { title: "오프닝 (30초)", content: "\"안녕하세요 사장님, 저는 네오래빗이라는 동네 쿠폰·리워드 플랫폼에서 나왔습니다. 1분만 시간 주시면 사장님 매장에 도움 되는 이야기 드릴게요.\"", color: "#028090" },
            { title: "핵심 제안 (1분)", content: "\"배달앱에 수수료를 많이 내고 계시잖아요. 저희는 입점비도 무료, 수수료도 0%입니다. 고객이 QR 찍으면 자동으로 쿠폰이 쌓이고, 10개 모이면 사장님이 정한 혜택을 주는 구조예요.\"", color: "#0891B2" },
            { title: "클로징 (30초)", content: "\"지금 바로 앱 설치하시면 5분이면 입점 신청 끝나요. 사업자등록증만 사진 찍어 올려주시면 됩니다. 도움 필요하시면 제가 같이 해드릴게요.\"", color: "#059669" },
          ].map((s, i) => (
            <div key={i} style={{ background: "#fff", borderRadius: 14, padding: 16, marginBottom: 12, boxShadow: "0 1px 4px rgba(0,0,0,0.05)", borderLeft: "4px solid " + s.color }}>
              <div style={{ fontSize: 14, fontWeight: 700, color: s.color, marginBottom: 8 }}>{s.title}</div>
              <div style={{ fontSize: 13, color: "#374151", lineHeight: 1.6, fontStyle: "italic" }}>{s.content}</div>
            </div>
          ))}

          <div style={{ fontSize: 16, fontWeight: 800, color: "#1A1A2E", marginTop: 24, marginBottom: 12 }}>자주 받는 질문</div>
          {[
            { q: "\"돈 안 받으면 뭘로 돈 벌어요?\"", a: "지금은 무료로 업체를 모으는 단계이고, 나중에 월 구독료 형태로 소액만 받을 예정입니다. 매출 수수료는 영구 0%입니다." },
            { q: "\"안 하면 불이익 있어요?\"", a: "전혀 없습니다. 해지도 자유예요. 부담 없이 시작해보세요." },
            { q: "\"쿠폰 비용은 누가?\"", a: "사장님이 직접 설정하시는 거예요. 커피 1잔, 10% 할인 등 부담 없는 수준으로요." },
            { q: "\"리워드 정산은?\"", a: "매주 금요일에 사용 금액을 사장님 계좌로 입금해 드립니다." },
            { q: "\"바쁜데 나중에 할게요\"", a: "네, 명함 드릴게요. 앱 이름은 '네오래빗 업체용'입니다." },
          ].map((faq, i) => (
            <div key={i} style={{ background: "#fff", borderRadius: 14, padding: 14, marginBottom: 10, boxShadow: "0 1px 4px rgba(0,0,0,0.05)" }}>
              <div style={{ fontSize: 13, fontWeight: 700, color: "#1A1A2E", marginBottom: 6 }}>{faq.q}</div>
              <div style={{ fontSize: 12, color: "#6B7280", lineHeight: 1.5 }}>{faq.a}</div>
            </div>
          ))}

          <div style={{ fontSize: 16, fontWeight: 800, color: "#1A1A2E", marginTop: 24, marginBottom: 12 }}>활성화 안내 멘트</div>
          {[
            { n: "1", title: "쿠폰 10개 혜택", msg: "\"쿠폰 10개 모은 손님에게 뭘 주실 건지 적어주세요. 예: 아메리카노 1잔 무료\"" },
            { n: "2", title: "당근(리워드) 혜택", msg: "\"리워드로 줄 혜택이랑 최소 사용금액을 설정해주세요. 예: 1만원 이상 시 당근 3개로 음료 교환\"" },
            { n: "3", title: "상세페이지", msg: "\"매장 사진, 메뉴 소개, 영업시간을 앱에서 올려주시면 고객들이 보고 방문합니다\"" },
          ].map((item, i) => (
            <div key={i} style={{ background: "#fff", borderRadius: 14, padding: 14, marginBottom: 10, boxShadow: "0 1px 4px rgba(0,0,0,0.05)", display: "flex", gap: 12, alignItems: "flex-start" }}>
              <div style={{ width: 28, height: 28, borderRadius: 8, background: "#028090", color: "#fff", display: "flex", alignItems: "center", justifyContent: "center", fontSize: 13, fontWeight: 800, flexShrink: 0 }}>{item.n}</div>
              <div>
                <div style={{ fontSize: 13, fontWeight: 700, color: "#1A1A2E", marginBottom: 4 }}>{item.title}</div>
                <div style={{ fontSize: 12, color: "#6B7280", fontStyle: "italic" }}>{item.msg}</div>
              </div>
            </div>
          ))}
        </div>
      )}

      {/* Bottom Nav */}
      <div className="neo-nav-bar">
        <div className="neo-app-shell" style={{
          display: "flex", justifyContent: "space-around", alignItems: "center",
          paddingTop: 8,
          paddingBottom: "max(12px, env(safe-area-inset-bottom, 0px))",
          paddingLeft: "max(0px, env(safe-area-inset-left, 0px))",
          paddingRight: "max(0px, env(safe-area-inset-right, 0px))",
          boxSizing: "border-box",
        }}>
        {tabs.map(t => (
          <button key={t.id} onClick={() => { setTab(t.id); setShowDetail(null); if (t.id !== "stores") setStoreSelectionMode(false); }} style={{
            background: "none", border: "none", cursor: "pointer", display: "flex", flexDirection: "column", alignItems: "center", gap: 2,
            padding: "4px clamp(2px, 1vw, 8px)", flex: "1 1 0", minWidth: 0, maxWidth: "20%",
            position: "relative",
          }}>
            <span style={{ fontSize: 20, opacity: tab === t.id ? 1 : 0.4, position: "relative", display: "inline-block" }}>
              {t.icon}
              {t.id === "chat" && adminChatUnread > 0 ? (
                <span style={{
                  position: "absolute", top: -6, right: -10, minWidth: 18, height: 18, padding: "0 5px", borderRadius: 999,
                  background: "#EF4444", color: "#fff", fontSize: 11, fontWeight: 800, lineHeight: "18px", textAlign: "center",
                  boxShadow: "0 0 0 2px #fff", boxSizing: "border-box",
                }}>{adminChatUnread > 9 ? "9+" : String(adminChatUnread)}</span>
              ) : null}
            </span>
            <span style={{ fontSize: 10, fontWeight: 600, color: tab === t.id ? "#028090" : "#9CA3AF" }}>{t.label}</span>
          </button>
        ))}
        </div>
      </div>

      {/* Add Store Modal */}
      <Modal open={showAddStore} onClose={() => setShowAddStore(false)} title="업체 입점 등록">
        <Input label="업체명" value={newStore.name} onChange={v => setNewStore(p => ({ ...p, name: v }))} placeholder="카페 이름, 음식점 이름 등" />
        <Select label="업종" value={newStore.type} onChange={v => setNewStore(p => ({ ...p, type: v }))} options={STORE_TYPES} />
        <Input label="매장 주소" value={newStore.address} onChange={v => setNewStore(p => ({ ...p, address: v }))} placeholder="매장 주소" />
        <Input label="메모 (선택)" value={newStore.note} onChange={v => setNewStore(p => ({ ...p, note: v }))} placeholder="특이사항, 사장님 반응 등" multiline />
        <Btn onClick={handleAddStore} disabled={!newStore.name || !newStore.type}>입점 등록하기</Btn>
      </Modal>

      {/* Add Visit Modal */}
      <Modal open={showAddVisit} onClose={() => { setShowAddVisit(false); setEditingVisitId(null); setVisitFormMode("add"); }} title={visitFormMode === "edit" ? "방문 기록 수정" : "방문 기록"}>
        <Input label="업체명" value={newVisit.name} onChange={v => setNewVisit(p => ({ ...p, name: v }))} placeholder="방문한 매장 이름" />
        <Input label="매장 주소" value={newVisit.address} onChange={v => setNewVisit(p => ({ ...p, address: v }))} placeholder="매장 주소" />
        <Input label="방문일" value={newVisit.date} onChange={v => setNewVisit(p => ({ ...p, date: v }))} type="date" />
        <div style={{ marginBottom: 14 }}>
          <label style={{ display: "block", fontSize: 12, fontWeight: 600, color: "#374151", marginBottom: 8 }}>방문 결과</label>
          <div style={{ display: "flex", gap: 8, flexWrap: "wrap" }}>
            {[["success", "✅ 입점 성공", "#059669"], ["retry", "🔄 재방문", "#D97706"], ["fail", "❌ 거절", "#DC2626"]].map(([val, label, color]) => (
              <button key={val} onClick={() => setNewVisit(p => ({ ...p, result: val }))} style={{
                flex: "1 1 90px", minWidth: 0, padding: "10px 8px", borderRadius: 10, cursor: "pointer", fontSize: 12, fontWeight: 600,
                border: newVisit.result === val ? "2px solid " + color : "1.5px solid #E5E7EB",
                background: newVisit.result === val ? color + "10" : "#fff", color: newVisit.result === val ? color : "#6B7280",
              }}>{label}</button>
            ))}
          </div>
        </div>
        <Input label="메모 (선택)" value={newVisit.note} onChange={v => setNewVisit(p => ({ ...p, note: v }))} placeholder="사장님 반응, 특이사항 등" multiline />
        <Btn onClick={handleSaveVisit} disabled={!newVisit.name || !newVisit.result}>{visitFormMode === "edit" ? "수정 저장" : "기록 저장"}</Btn>
      </Modal>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<RepLoginGate />);
</script>
</body>
</html>
